<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Limpiar Duplicados · La Polla 2026</title>
<style>
  body { font-family: monospace; background: #0a0e1a; color: #e8eaf0; padding: 32px; max-width: 800px; margin: 0 auto; }
  h1 { color: #f5c842; font-size: 1.4rem; margin-bottom: 4px; }
  p  { color: #6b7a99; font-size: 0.85rem; margin-bottom: 24px; }
  button { padding: 10px 24px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 700; margin-right: 10px; }
  #btn-dry  { background: #3b82f6; color: #fff; }
  #btn-real { background: #ef4444; color: #fff; display: none; }
  #btn-dry:disabled, #btn-real:disabled { opacity: 0.5; cursor: not-allowed; }
  #log { margin-top: 24px; background: #0f1525; border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 16px; font-size: 0.78rem; line-height: 1.8; max-height: 500px; overflow-y: auto; white-space: pre-wrap; }
  .ok   { color: #22c55e; }
  .warn { color: #f5c842; }
  .err  { color: #ef4444; }
  .info { color: #6b7a99; }
  .big  { font-size: 1.1rem; font-weight: 700; }
</style>
</head>
<body>
<h1>🧹 Limpiar Duplicados de Apuestas</h1>
<p>Primero haz un <strong>Dry Run</strong> para ver qué se borraría. Luego confirma con <strong>Borrar Duplicados</strong>.</p>

<button id="btn-dry" onclick="correr(false)">🔍 Dry Run (solo analizar)</button>
<button id="btn-real" onclick="correr(true)">🗑 Borrar Duplicados</button>

<div id="log">Listo para analizar...</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, getDocs, writeBatch, doc }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAqrYCFQN8epqx9HZrd7t1Ywz9wVf2Fx5Y",
  authDomain: "polla-495421-ab029.firebaseapp.com",
  projectId: "polla-495421-ab029",
  storageBucket: "polla-495421-ab029.firebasestorage.app",
  messagingSenderId: "366484877682",
  appId: "1:366484877682:web:a7c21e72c012d4b709adeb"
};

const ADMIN_UID = 'ILpJZ22JLnQWhrLZgPzIvUn6MJt1';
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
const provider = new GoogleAuthProvider();

const logEl = document.getElementById('log');
function log(msg, cls='') {
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}
function clearLog() { logEl.innerHTML = ''; }

const normPid = id => (id && id.startsWith('fg')) ? id.slice(2) : id;

// Auth check
onAuthStateChanged(auth, user => {
  if (!user) {
    clearLog();
    log('⚠ No autenticado. Iniciando login...', 'warn');
    signInWithPopup(auth, provider).catch(e => log('Error login: ' + e.message, 'err'));
  } else if (user.uid !== ADMIN_UID) {
    log('❌ No eres admin.', 'err');
    document.getElementById('btn-dry').disabled = true;
  } else {
    log('✅ Autenticado como admin: ' + user.email, 'ok');
  }
});

window.correr = async function(borrarReal) {
  clearLog();
  document.getElementById('btn-dry').disabled = true;
  document.getElementById('btn-real').style.display = 'none';

  log(borrarReal ? '🗑 MODO BORRADO REAL' : '🔍 MODO DRY RUN — no se borra nada', borrarReal ? 'err' : 'info');
  log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');
  log('Leyendo apuestas de Firestore...', 'info');

  const snap = await getDocs(collection(db, 'apuestas'));
  log(`Total documentos en apuestas: ${snap.size}`, 'info');

  // Agrupar por uid+partidoId normalizado
  const grupos = new Map();
  snap.docs.forEach(d => {
    const data = d.data();
    const pid = normPid(data.partidoId);
    const key = `${data.uid}__${pid}`;
    if (!grupos.has(key)) grupos.set(key, []);
    grupos.get(key).push({ id: d.id, ref: d.ref, data, ts: data.actualizadoEn?.seconds || data.creadoEn?.seconds || 0 });
  });

  // Encontrar duplicados
  const aBorrar = [];
  let usuariosConDups = new Set();

  grupos.forEach((docs, key) => {
    if (docs.length <= 1) return;
    // Ordenar por timestamp desc — el más reciente primero
    docs.sort((a, b) => b.ts - a.ts);
    const uid = docs[0].data.uid;
    const pid = normPid(docs[0].data.partidoId);
    usuariosConDups.add(uid);
    log(`DUP: ${docs[0].data.nombre || uid} | partido ${pid} | ${docs.length} docs → conservar 1, borrar ${docs.length-1}`, 'warn');
    // El primero (más reciente) se conserva, el resto se borra
    docs.slice(1).forEach(d => aBorrar.push(d.ref));
  });

  log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');
  log(`Usuarios con duplicados: ${usuariosConDups.size}`, 'warn');
  log(`Documentos a borrar: ${aBorrar.length}`, aBorrar.length > 0 ? 'warn' : 'ok');

  if (aBorrar.length === 0) {
    log('✅ No hay duplicados. Nada que limpiar.', 'ok');
    document.getElementById('btn-dry').disabled = false;
    return;
  }

  if (!borrarReal) {
    log('', '');
    log('👆 Dry run completado. Si todo se ve bien, haz clic en "Borrar Duplicados".', 'ok');
    document.getElementById('btn-real').style.display = 'inline-block';
    document.getElementById('btn-dry').disabled = false;
    return;
  }

  // BORRADO REAL en batches de 400
  log('', '');
  log('Borrando...', 'warn');
  let borrados = 0;
  for (let i = 0; i < aBorrar.length; i += 400) {
    const chunk = aBorrar.slice(i, i + 400);
    const batch = writeBatch(db);
    chunk.forEach(ref => batch.delete(ref));
    await batch.commit();
    borrados += chunk.length;
    log(`Borrados ${borrados}/${aBorrar.length}...`, 'info');
  }

  log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'info');
  log(`✅ Listo. ${borrados} documentos duplicados eliminados.`, 'ok');
  document.getElementById('btn-dry').disabled = false;
};
</script>
</body>
</html>
