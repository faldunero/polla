<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Polla 2026 - Pro Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1a237e;
            --accent: #ffd700;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --sidebar-width: 280px;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            color: #333;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--primary);
            height: 100vh;
            position: fixed;
            overflow-y: auto;
            color: white;
            padding: 20px;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .sidebar h2 {
            font-size: 1.2rem;
            color: var(--accent);
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .sidebar-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .pais-mini-card {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .pais-mini-card:hover {
            background: rgba(255,255,255,0.15);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .flag { font-size: 1.8rem; display: block; }
        .country-name { font-size: 0.75rem; display: block; margin-top: 5px; color: #e0e0e0; }

        /* --- MAIN CONTENT --- */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 40px;
            max-width: 1200px;
        }

        header h1 {
            color: var(--primary);
            margin: 0 0 40px 0;
            font-size: 2.5rem;
            border-bottom: 4px solid var(--accent);
            display: inline-block;
        }

        .grupos-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .grupo-block {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .grupo-title {
            background: var(--primary);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            margin: -20px -20px 15px -20px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .match-item {
            border-bottom: 1px solid #eee;
            padding: 12px 0;
            font-size: 0.85rem;
        }

        .match-teams { font-weight: 600; color: var(--primary); display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .match-meta { font-size: 0.7rem; color: #777; display: flex; justify-content: space-between; }
        .match-stadium { font-size: 0.65rem; color: #999; font-style: italic; margin-top: 2px; }

        /* --- MODAL --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: white;
            padding: 25px;
            border-radius: 20px;
            width: 95%;
            max-width: 500px;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalIn 0.3s ease-out;
        }

        @keyframes modalIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header { text-align: center; margin-bottom: 20px; }
        .modal-flag { font-size: 4rem; display: block; margin-bottom: 10px; }
        
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            text-align: left;
        }

        .info-item {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            border-left: 3px solid var(--primary);
        }

        .info-label {
            font-size: 0.65rem;
            color: #666;
            text-transform: uppercase;
            display: block;
            margin-bottom: 3px;
        }

        .info-value {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary);
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
            z-index: 11;
        }

        /* --- ESTADIOS --- */
        .stadium-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .stadium-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: 0.3s;
        }

        .stadium-card:hover {
            transform: scale(1.02);
        }

        .stadium-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #2c3e50;
        }

        .stadium-info {
            padding: 15px;
        }

        .stadium-info h4 { margin: 0 0 10px 0; color: var(--primary); }
        .stadium-info p { margin: 5px 0; font-size: 0.85rem; color: #666; }

        #stadium-modal-content {
            max-width: 800px;
            padding: 0;
            overflow: hidden;
        }

        .big-stadium-img { width: 100%; height: auto; display: block; max-height: 500px; object-fit: cover; }

        @media (max-width: 900px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 20px; }
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2><i class="fas fa-flag"></i> Selecciones</h2>
    <div id="paises-sidebar" class="sidebar-grid"></div>
</aside>

<div class="main-content">
    <header><h1>🏆 La Polla 2026</h1></header>

    <h3 class="section-title"><i class="fas fa-users-cog"></i> Fase de Grupos</h3>
    <div id="grupos-wrapper" class="grupos-container"></div>

    <h3 class="section-title"><i class="fas fa-landmark"></i> Sedes y Estadios</h3>
    <div id="estadios-container" class="stadium-grid"></div>
</div>

<!-- Modal Paises -->
<div id="paisModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div id="modal-body"></div>
    </div>
</div>

<!-- Modal Estadio -->
<div id="stadiumModal" class="modal">
    <div class="modal-content" id="stadium-modal-content">
        <span class="close-modal" onclick="closeStadiumModal()" style="color: white; text-shadow: 0 0 5px black;">&times;</span>
        <div id="stadium-modal-body"></div>
    </div>
</div>

<script>
    // Mapeo basado en tus archivos locales vistos en Screenshot 2026-05-05 at 10.55.50 PM.png
    const mapaImagenesEstadios = {
        'ATLANTA': 'estadios/estadio_atlanta.png',
        'AZTECA': 'estadios/estadio_azteca.png',
        'BOSTON': 'estadios/estadio_boston.png',
        'DALLAS': 'estadios/estadio_dallas.png',
        'GUADALAJARA': 'estadios/estadio_guadalajara.png',
        'HOUSTON': 'estadios/estadio_houston.png',
        'KANSAS': 'estadios/estadio_kansas.png',
        'LOS ANGELES': 'estadios/estadio_los_angeles.png',
        'MONTERREY': 'estadios/estadio_monterrey.png',
        'TORONTO': 'estadios/estadio_toronto.png',
        'VANCOUVER': 'estadios/estadio_vancouver.png'
    };

    const banderas = {
        'QATAR': '🇶🇦', 'CATAR': '🇶🇦', 'ECUADOR': '🇪🇨', 'SENEGAL': '🇸🇳', 'PAISES BAJOS': '🇳🇱',
        'INGLATERRA': '🏴󠁧󠁢󠁥󠁮󠁧󠁿', 'IRAN': '🇮🇷', 'ESTADOS UNIDOS': '🇺🇸', 'USA': '🇺🇸', 'GALES': '🏴󠁧󠁢󠁷󠁬󠁳󠁿',
        'ARGENTINA': '🇦🇷', 'ARABIA SAUDITA': '🇸🇦', 'MEXICO': '🇲🇽', 'POLONIA': '🇵🇱',
        'FRANCIA': '🇫🇷', 'AUSTRALIA': '🇦🇺', 'DINAMARCA': '🇩🇰', 'TUNEZ': '🇹🇳',
        'ESPAÑA': '🇪🇸', 'ESPANA': '🇪🇸', 'COSTA RICA': '🇨🇷', 'ALEMANIA': '🇩🇪', 'JAPON': '🇯🇵',
        'BELGICA': '🇧🇪', 'CANADA': '🇨🇦', 'MARRUECOS': '🇲🇦', 'CROACIA': '🇭🇷',
        'BRASIL': '🇧🇷', 'SERBIA': '🇷🇸', 'SUIZA': '🇨🇭', 'CAMERUN': '🇨🇲',
        'PORTUGAL': '🇵🇹', 'GHANA': '🇬🇭', 'URUGUAY': '🇺🇾', 'COREA DEL SUR': '🇰🇷',
        'CHILE': '🇨🇱', 'PERU': '🇵🇪', 'VENEZUELA': '🇻🇪', 'BOLIVIA': '🇧🇴', 'COLOMBIA': '🇨🇴',
        'ITALIA': '🇮🇹', 'ALEMANIA': '🇩🇪'
    };

    let globalData = {};

    function normalize(text) {
        if (!text) return "";
        return text.toString().trim().toUpperCase()
            .normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    function formatExcelDate(serial) {
        if (!serial || isNaN(serial)) return serial || 'TBD';
        const date = new Date(Math.round((serial - 25569) * 86400 * 1000));
        return date.toLocaleDateString('es-CL');
    }

    function formatExcelTime(excelTime) {
        if (!excelTime || isNaN(excelTime)) return excelTime || '--:--';
        const totalMinutes = Math.round(excelTime * 24 * 60);
        const hours = Math.floor(totalMinutes / 60);
        const minutes = totalMinutes % 60;
        return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
    }

    function getValue(obj, keys) {
        for (let key of keys) {
            if (obj[key] !== undefined && obj[key] !== null) return obj[key];
        }
        return 'N/A';
    }

    // Lógica para priorizar tus imágenes locales
    function getStadiumImg(estadioNombre, size = "400x250") {
        const key = normalize(estadioNombre);
        
        // 1. Intento de match exacto o parcial con tus archivos
        for (let estadioKey in mapaImagenesEstadios) {
            if (key.includes(estadioKey)) {
                return mapaImagenesEstadios[estadioKey];
            }
        }

        // 2. Fallback a Unsplash si no hay match local
        const query = encodeURIComponent(estadioNombre + " soccer stadium");
        return `https://source.unsplash.com/featured/${size}/?stadium,soccer,arena&${query}`;
    }

    function showPaisDetail(nombre) {
        const p = globalData.paises.find(item => normalize(item.nombre) === normalize(nombre));
        if (!p) return;

        const body = document.getElementById('modal-body');
        body.innerHTML = `
            <div class="modal-header">
                <span class="modal-flag">${banderas[normalize(p.nombre)] || '🏳️'}</span>
                <h2 style="margin:0; color: var(--primary);">${p.nombre}</h2>
                <span style="color:#666;">Grupo ${p.grupo || 'TBD'}</span>
            </div>
            <div class="info-grid">
                <div class="info-item"><span class="info-label">Ranking FIFA</span><span class="info-value">${getValue(p, ['ranking_2022', 'ranking_fifa', 'ranking'])}</span></div>
                <div class="info-item"><span class="info-label">Participaciones</span><span class="info-value">${getValue(p, ['participaciones', 'mundiales_jugados'])}</span></div>
                <div class="info-item"><span class="info-label">Goleador Histórico</span><span class="info-value">${getValue(p, ['goleador_historico', 'top_scorer'])}</span></div>
                <div class="info-item"><span class="info-label">Sede Base</span><span class="info-value">${getValue(p, ['sede', 'sede_base', 'base_camp'])}</span></div>
            </div>
        `;
        document.getElementById('paisModal').style.display = 'flex';
    }

    function showStadiumDetail(estadio) {
        const body = document.getElementById('stadium-modal-body');
        const imgUrl = getStadiumImg(estadio.nombre, "800x500");
        
        body.innerHTML = `
            <img src="${imgUrl}" class="big-stadium-img" onerror="this.src='https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=800'">
            <div style="padding:25px;">
                <h2 style="color:var(--primary); margin-top:0;">${estadio.nombre}</h2>
                <p><strong><i class="fas fa-city"></i> Ciudad:</strong> ${estadio.ciudad || 'N/A'}</p>
                <p><strong><i class="fas fa-users"></i> Capacidad:</strong> ${estadio.capacidad?.toLocaleString() || 'N/A'} espectadores</p>
                <hr>
                <p style="color:#666; font-size:0.9rem;">Sede oficial confirmada para la Copa del Mundo 2026.</p>
            </div>
        `;
        document.getElementById('stadiumModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('paisModal').style.display = 'none'; }
    function closeStadiumModal() { document.getElementById('stadiumModal').style.display = 'none'; }

    async function init() {
        try {
            const res = await fetch('http://localhost:3000/api/data');
            globalData = await res.json();

            const sContainer = document.getElementById('paises-sidebar');
            globalData.paises.sort((a,b) => a.nombre.localeCompare(b.nombre)).forEach(p => {
                const key = normalize(p.nombre);
                const card = document.createElement('div');
                card.className = 'pais-mini-card';
                card.onclick = () => showPaisDetail(p.nombre);
                card.innerHTML = `<span class="flag">${banderas[key] || '🏳️'}</span><span class="country-name">${p.nombre}</span>`;
                sContainer.appendChild(card);
            });

            const partidosPorGrupo = {};
            globalData.partidos.forEach(m => {
                const pLocal = globalData.paises.find(p => normalize(p.nombre) === normalize(m.local));
                const pVisita = globalData.paises.find(p => normalize(p.nombre) === normalize(m.visita));
                let grupo = (pLocal && pLocal.grupo !== 'Desconocido') ? pLocal.grupo : (pVisita ? pVisita.grupo : null);

                if (grupo && grupo !== 'Desconocido') {
                    if (!partidosPorGrupo[grupo]) partidosPorGrupo[grupo] = [];
                    partidosPorGrupo[grupo].push(m);
                }
            });

            const gWrapper = document.getElementById('grupos-wrapper');
            Object.keys(partidosPorGrupo).sort().forEach(grupo => {
                const block = document.createElement('div');
                block.className = 'grupo-block';
                const partidosHtml = partidosPorGrupo[grupo].map(m => `
                    <div class="match-item">
                        <div class="match-teams">
                            <span onclick="showPaisDetail('${m.local}')" style="cursor:pointer">${banderas[normalize(m.local)] || '🏳️'} ${m.local}</span>
                            <span>vs</span>
                            <span onclick="showPaisDetail('${m.visita}')" style="cursor:pointer">${m.visita} ${banderas[normalize(m.visita)] || '🏳️'}</span>
                        </div>
                        <div class="match-meta">
                            <span><i class="far fa-calendar"></i> ${formatExcelDate(m.fecha)}</span>
                            <span><i class="far fa-clock"></i> ${formatExcelTime(m.hora)}</span>
                        </div>
                    </div>
                `).join('');
                block.innerHTML = `<div class="grupo-title"><span>GRUPO ${grupo}</span> <i class="fas fa-trophy"></i></div>${partidosHtml}`;
                gWrapper.appendChild(block);
            });

            const eContainer = document.getElementById('estadios-container');
            globalData.estadios.forEach(e => {
                const card = document.createElement('div');
                card.className = 'stadium-card';
                card.onclick = () => showStadiumDetail(e);
                
                const finalImg = getStadiumImg(e.nombre);

                card.innerHTML = `
                    <img src="${finalImg}" class="stadium-img" alt="${e.nombre}" onerror="this.src='https://images.unsplash.com/photo-1522778119026-d647f0596c20?q=80&w=400'">
                    <div class="stadium-info">
                        <h4>${e.nombre}</h4>
                        <p><i class="fas fa-city"></i> ${e.city || e.ciudad || 'N/A'}</p>
                        <p><i class="fas fa-users"></i> ${e.capacidad?.toLocaleString() || 'N/A'} pers.</p>
                    </div>`;
                eContainer.appendChild(card);
            });

        } catch (err) { console.error("Error cargando datos:", err); }
    }

    window.onclick = e => { 
        if (e.target.id == 'paisModal') closeModal(); 
        if (e.target.id == 'stadiumModal') closeStadiumModal();
    }
    init();
</script>
</body>
</html>
