function log(msg,cls=''){const el=document.getElementById('log');el.innerHTML+=`<div class="${cls}">${msg}</div>`;el.scrollTop=el.scrollHeight;}
window.importar=async function(){
  const btn=document.getElementById('btn');
  btn.disabled=true;btn.textContent='⏳ Importando...';
  log(`<span class="info">Iniciando — ${PARTIDOS.length} partidos desde el calendario oficial FIFA</span>`);
  log(`<span class="sep">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>`);
  let ok=0,err=0,lastG='';
  for(const p of PARTIDOS){
    const{id,...data}=p;
    if(data.grupo!==lastG){log(`<span class="sep">──</span> <span class="grp">GRUPO ${data.grupo}</span>`);lastG=data.grupo;}
    try{
      await setDoc(doc(db,'partidos',id),data);
      log(`<span class="ok">✓</span> <span style="color:#666">${id}</span> &nbsp; ${data.local} <span style="color:#555">vs</span> ${data.visita} <span style="color:#444">· ${data.fecha} ${data.hora_santiago||''} · ${data.estadio}</span>`);
      ok++;
    }catch(e){log(`<span class="err">✗ ${id}: ${e.message}</span>`);err++;}
  }
  log(`<span class="sep">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>`);
  log(`<span class="${ok===PARTIDOS.length?'ok':'err'}"><strong>✅ ${ok} importados &nbsp;|&nbsp; ❌ ${err} errores</strong></span>`);
  btn.textContent=`✅ Completado (${ok}/${PARTIDOS.length})`;
};
