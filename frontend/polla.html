<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Polla 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <style>
    :root{
      --bg:#0a0e1a;
      --bg2:#0f1525;
      --card:#141b2d;
      --card2:#1a2238;
      --border:rgba(255,255,255,0.07);
      --gold:#f5c842;
      --gold2:#e8a800;
      --blue:#3b82f6;
      --green:#22c55e;
      --red:#ef4444;
      --text:#e8eaf0;
      --muted:#96a0b5;
      --radius:16px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'DM Sans',sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
    }

    .site-nav{
      background:#DA0015;
      border-bottom:3px solid #F0C040;
      padding:0 40px;
      height:62px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      position:sticky;
      top:0;
      z-index:200;
    }
    .site-nav-brand{
      display:flex;
      align-items:center;
      gap:12px;
      text-decoration:none;
    }
    .site-nav-logo{
      width:36px;height:36px;background:#F0C040;border-radius:50%;
      display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;
    }
    .site-nav-brand-text small{
      display:block;font-size:.58rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
      color:rgba(255,255,255,.6);font-family:'DM Sans',sans-serif;
    }
    .site-nav-brand-text strong{
      display:block;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;font-weight:800;
      color:#fff;letter-spacing:.04em;line-height:1;
    }
    .site-nav-links{display:flex;align-items:center;gap:4px}
    .site-nav-link{
      font-family:'Bebas Neue',sans-serif;
      font-size:.85rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
      color:rgba(255,255,255,.85);padding:7px 14px;border-radius:4px;text-decoration:none;
      transition:all .2s;border:1.5px solid transparent;
    }
    .site-nav-link:hover{color:#fff;background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2)}
    .site-nav-link.active-now{color:#F0C040}

    nav.app-nav{
      background:rgba(10,14,26,.92);
      backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
      padding:0 28px;
      height:64px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      position:sticky;
      top:0;
      z-index:100;
    }
    .nav-brand{
      font-family:'Bebas Neue',sans-serif;
      font-size:1.6rem;
      letter-spacing:.06em;
      color:var(--gold);
    }
    .nav-right{display:flex;align-items:center;gap:14px}
    .user-pill{
      display:flex;align-items:center;gap:10px;
      background:var(--card2);
      border:1px solid var(--border);
      border-radius:999px;
      padding:6px 14px 6px 8px;
      font-size:.85rem;
    }
    .user-avatar{
      width:30px;height:30px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);
      background:var(--card);
    }

    .btn{
      padding:9px 20px;border-radius:10px;border:none;
      font-family:'DM Sans',sans-serif;font-weight:600;font-size:.88rem;
      cursor:pointer;transition:all .2s;
    }
    .btn-gold{background:var(--gold);color:#0a0e1a}
    .btn-gold:hover{background:var(--gold2);transform:translateY(-1px)}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}
    .btn-outline:hover{border-color:var(--gold);color:var(--gold)}
    .btn-sm{padding:6px 14px;font-size:.8rem}
    .btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
    .btn-danger:hover{background:rgba(239,68,68,.25)}

    .login-screen{
      min-height:calc(100vh - 62px);
      display:flex;
      align-items:center;
      justify-content:center;
      background:radial-gradient(ellipse at top, rgba(245,200,66,.12) 0%, transparent 55%, var(--bg) 100%);
      padding:24px;
    }
    .login-card{
      text-align:center;
      padding:52px 44px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:24px;
      max-width:420px;
      width:100%;
      box-shadow:0 32px 80px rgba(0,0,0,.5);
    }
    .login-icon{font-size:3.8rem;margin-bottom:16px;display:block}
    .login-card h1{
      font-family:'Bebas Neue',sans-serif;
      font-size:2.8rem;color:var(--gold);
      letter-spacing:.04em;margin-bottom:8px;
    }
    .login-card p{color:var(--muted);margin-bottom:32px;line-height:1.6}
    .btn-google{
      display:flex;align-items:center;justify-content:center;gap:12px;
      width:100%;padding:14px;background:#fff;color:#1f2937;border:none;border-radius:12px;
      font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;
    }
    .btn-google:hover{background:#f3f4f6;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
    .btn-google img{width:20px;height:20px}

    .tabs{
      display:flex;gap:4px;padding:20px 28px 0;border-bottom:1px solid var(--border);
    }
    .tab{
      padding:10px 20px;border-radius:10px 10px 0 0;font-weight:600;font-size:.88rem;cursor:pointer;
      color:var(--muted);border:none;background:transparent;transition:all .2s;position:relative;
    }
    .tab.active{color:var(--gold);background:var(--card)}
    .tab.active::after{
      content:"";position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--gold);
    }

    .main{padding:28px;max-width:1100px;margin:0 auto}
    .page{display:none}
    .page.active{display:block}

    .section-header{
      display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;
    }
    .section-header h2{
      font-family:'Bebas Neue',sans-serif;
      font-size:1.8rem;letter-spacing:.04em;color:var(--gold);
    }

    .alert{
      padding:12px 18px;border-radius:10px;font-size:.88rem;margin-bottom:20px;display:flex;align-items:center;gap:10px;
    }
    .alert-info{background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);color:#93c5fd}
    .alert-warn{background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.25);color:var(--gold)}
    .alert-success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:var(--green)}
    .alert-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:var(--red)}

    .grupos-grid{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-top:20px;
    }
    .grupo-card{
      background:var(--card);border:2px solid var(--border);border-radius:var(--radius);
      padding:24px;cursor:pointer;transition:all .22s;position:relative;overflow:hidden;
    }
    
    .grupo-card::before{
     content:'';
     position:absolute;
     inset:0;
     background:linear-gradient(135deg, rgba(245,200,66,.04), transparent);
     opacity:0;
     transition:opacity .22s;
     pointer-events:none;
   }

.grupo-card .btn{
  position:relative;
  z-index:2;
}

    .grupo-card .btn{
      position:relative;
      z-index:2;
    }
    .grupo-card:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.3)}
    .grupo-card:hover::before{opacity:1}
    .grupo-card.mi-grupo{border-color:var(--gold);background:var(--card2)}
    .grupo-card h3{font-size:1.15rem;margin-bottom:6px}
    .grupo-card p{color:var(--muted);font-size:.85rem}

    .badge{
      display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;
      font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;
    }
    .badge-gold{background:rgba(245,200,66,.15);color:var(--gold)}
    .badge-blue{background:rgba(59,130,246,.15);color:#60a5fa}
    .badge-green{background:rgba(34,197,94,.15);color:var(--green)}

    /* ── ACORDEÓN APUESTAS (mismo look que admin) ── */
    .fase-block{margin-bottom:8px;border-radius:12px;overflow:hidden;border:1px solid var(--border);}
    .fase-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--card);cursor:pointer;user-select:none;transition:background .18s;gap:12px;}
    .fase-header:hover{background:var(--card2);}
    .fase-header.open{background:var(--card2);border-bottom:1px solid var(--border);}
    .fase-header-left{display:flex;align-items:center;gap:12px;}
    .fase-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
    .fase-icon-grupos{background:rgba(245,200,66,.12);color:var(--gold);}
    .fase-icon-elim{background:rgba(59,130,246,.12);color:#60a5fa;}
    .fase-label{font-family:'Bebas Neue',sans-serif;font-size:1rem;font-weight:800;letter-spacing:.05em;color:var(--text);}
    .fase-sublabel{font-size:.7rem;color:var(--muted);margin-top:1px;}
    .fase-chevron{color:var(--muted);transition:transform .22s;font-size:.85rem;flex-shrink:0;}
    .fase-header.open .fase-chevron{transform:rotate(180deg);}
    .fase-progress{font-size:.7rem;font-weight:700;font-family:'Bebas Neue',sans-serif;letter-spacing:.04em;padding:3px 10px;border-radius:6px;background:rgba(255,255,255,.05);color:var(--muted);white-space:nowrap;}
    .fase-progress.completo{background:rgba(34,197,94,.12);color:var(--green);}
    .fase-body{display:none;}
    .fase-body.open{display:block;}

    /* Tabs de grupo */
    .grupo-tabs-wrap{display:flex;align-items:center;gap:6px;padding:12px 16px 0;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--bg2);}
    .grupo-tab{font-family:'Bebas Neue',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:6px 13px;border-radius:7px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
    .grupo-tab:hover{border-color:rgba(245,200,66,.35);color:var(--gold);}
    .grupo-tab.active{background:var(--gold);color:#0a0e1a;border-color:var(--gold);}
    .grupo-tab .gtab-check{font-size:.6rem;opacity:.75;}
    .grupo-panel{display:none;padding:12px 16px;}
    .grupo-panel.active{display:block;}
    .fase-partidos-wrap{padding:12px 16px;}

    /* Partido row — nuevo diseño */
    .partido-row{
      background:var(--card2);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;
      transition:border-color .2s;
    }
    .partido-row-inner{
      display:grid;grid-template-columns:1fr auto 1fr auto;align-items:center;gap:12px;padding:14px 16px;
    }
    .partido-row.tiene-apuesta{border-color:rgba(34,197,94,.35);}
    .partido-row.tiene-apuesta .partido-row-inner{border-left:3px solid var(--green);}
    .partido-row:hover{border-color:rgba(245,200,66,.3);}
    .team-name{display:flex;align-items:center;gap:8px;font-weight:700;font-size:.9rem;color:var(--text);}
    .team-name.right{flex-direction:row-reverse;}

    /* Centro inputs */
    .score-inputs{display:flex;flex-direction:column;align-items:center;gap:4px;}
    .score-inputs-row{display:flex;align-items:center;gap:6px;}
    .score-input{
      width:46px;height:46px;text-align:center;background:var(--card);border:1px solid var(--border);
      border-radius:10px;color:var(--text);font-size:1.2rem;font-weight:700;font-family:'DM Sans',sans-serif;transition:all .2s;
    }
    .score-input:focus{outline:none;border-color:var(--gold);background:var(--bg2);}
    .score-input:disabled{opacity:.45;cursor:not-allowed;}
    .score-sep{color:var(--muted);font-weight:800;font-size:1.1rem;}
    .score-date{font-size:.65rem;color:var(--muted);}

    /* Acciones derecha */
    .partido-acciones{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;min-width:100px;}
    .save-btn{
      padding:7px 16px;background:var(--gold);color:#0a0e1a;border:none;border-radius:8px;
      font-weight:700;font-size:.78rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;
    }
    .save-btn:hover{background:var(--gold2);}
    .save-btn:disabled{opacity:.4;cursor:not-allowed;}
    .save-btn.guardado{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);}

    /* Meta bar */
    .partido-meta{
      padding:6px 16px 10px;font-size:.67rem;color:var(--muted);
      display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;
    }
    .partido-meta i{color:rgba(245,200,66,.5);font-size:.62rem;}

    .pts-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:.75rem;font-weight:700;}
    .pts-4{background:rgba(245,200,66,.2);color:var(--gold);}
    .pts-3{background:rgba(59,130,246,.2);color:#60a5fa;}
    .pts-2{background:rgba(34,197,94,.2);color:var(--green);}
    .pts-1{background:rgba(148,163,184,.2);color:#94a3b8;}
    .pts-0{background:rgba(239,68,68,.15);color:var(--red);}

    .resultado-real{font-size:.72rem;font-weight:700;font-family:'Bebas Neue',sans-serif;letter-spacing:.04em;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:2px 9px;color:var(--muted);}

    .cerrado-banner{
      background:linear-gradient(135deg,rgba(239,68,68,.1),rgba(239,68,68,.05));
      border:1px solid rgba(239,68,68,.3);border-radius:12px;padding:14px 20px;color:var(--red);
      font-weight:600;margin-bottom:20px;display:flex;align-items:center;gap:10px;
    }

    .ranking-table{width:100%;border-collapse:collapse;margin-top:16px}
    .ranking-table th{
      text-align:left;padding:10px 16px;font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;
      color:var(--muted);border-bottom:1px solid var(--border);
    }
    .ranking-table td{
      padding:14px 16px;border-bottom:1px solid var(--border);font-size:.92rem;
    }
    .ranking-table tr:last-child td{border-bottom:none}
    .ranking-table tr:hover td{background:var(--card2)}
    .pos-badge{
      width:30px;height:30px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;
      font-weight:700;font-size:.85rem;
    }
    .pos-1{background:rgba(245,200,66,.2);color:var(--gold)}
    .pos-2{background:rgba(148,163,184,.2);color:#94a3b8}
    .pos-3{background:rgba(205,127,50,.2);color:#cd7f32}
    .pos-n{background:var(--card2);color:var(--muted)}
    .score-bar-wrap{display:flex;align-items:center;gap:10px}
    .score-bar{
      flex:1;height:6px;background:var(--card2);border-radius:999px;overflow:hidden;max-width:120px;
    }
    .score-bar-fill{
      height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));border-radius:999px;transition:width .6s ease;
    }

    .empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
    .empty-state i{font-size:2.5rem;margin-bottom:14px;display:block}
    .cerrado-banner{
      background:linear-gradient(135deg, rgba(239,68,68,.1), rgba(239,68,68,.05));
      border:1px solid rgba(239,68,68,.3);border-radius:12px;padding:14px 20px;color:var(--red);
      font-weight:600;margin-bottom:20px;display:flex;align-items:center;gap:10px;
    }

    #toast{
      position:fixed;bottom:28px;right:28px;background:var(--card2);border:1px solid var(--border);border-radius:12px;
      padding:14px 20px;font-size:.88rem;box-shadow:0 16px 40px rgba(0,0,0,.4);z-index:9999;
      opacity:0;transform:translateY(10px);transition:all .3s;max-width:340px;pointer-events:none;
    }
    #toast.show{opacity:1;transform:translateY(0)}

    @media (max-width:640px){
      .site-nav{padding:0 16px}
      .site-nav-links .site-nav-link{display:none}
      .main{padding:16px}
      .tabs{padding:16px 16px 0;overflow-x:auto}
      .partido-row{grid-template-columns:1fr;gap:10px}
      .team-name.right{flex-direction:row;justify-content:flex-start;text-align:left}
      .score-inputs{justify-content:center}
      nav.app-nav{padding:0 16px}
    }
  </style>
</head>

    function normalizeText(t='') {
      return String(t).toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
    }

    function getFlag(nombre) {
      return FLAGS[normalizeText(nombre)] || '🏳️';
    }

    function formatFecha(f) {
      if (!f) return 'Fecha por definir';
      if (typeof f === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(f)) {
        const d = new Date(f + 'T12:00:00');
        return d.toLocaleDateString('es-CL', { day:'2-digit', month:'short' });
      }
      const d = new Date(f);
      if (!isNaN(d)) {
        return d.toLocaleDateString('es-CL', { day:'2-digit', month:'short' });
      }
      return String(f);
    }

    function formatFechaHora(ts) {
      if (!ts) return '';
      try {
        const d = ts?.toDate ? ts.toDate() : new Date(ts);
        return d.toLocaleDateString('es-CL', { day:'2-digit', month:'short', year:'numeric' }) + ' ' +
               d.toLocaleTimeString('es-CL', { hour:'2-digit', minute:'2-digit' });
      } catch {
        return '';
      }
    }

    function toast(msg, type='info') {
      const t = document.getElementById('toast');
      const icons = {
        info:'ℹ️ ',
        success:'✅ ',
        warn:'⚠️ ',
        error:'❌ '
      };
      t.textContent = (icons[type] || '') + msg;
      t.className = 'show';
      setTimeout(() => { t.className = ''; }, 3200);
    }
    window.toast = toast;

    function isCerrado() {
      return new Date() > FECHACIERRE;
    }

    function calcularPuntaje(real, apuesta) {
      const rl = Number(real.local);
      const rv = Number(real.visita);
      const al = Number(apuesta.local);
      const av = Number(apuesta.visita);

      if ([rl,rv,al,av].some(v => Number.isNaN(v))) return null;

      const exacto = al === rl && av === rv;
      const empateReal = rl === rv;

      if (exacto && !empateReal) return 4;
      if (exacto && empateReal) return 2;

      const gr = rl > rv ? 'L' : rl < rv ? 'V' : 'E';
      const ga = al > av ? 'L' : al < av ? 'V' : 'E';

      if (gr === ga && gr !== 'E') return 3;
      if (gr === 'E' && ga === 'E') return 1;
      return 0;
    }

    async function cargarPartidos() {
      const snap = await getDocs(collection(db, 'partidos'));
      globalPartidos = snap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .sort((a, b) => (Number(a.numero || 0) - Number(b.numero || 0)));
    }

    async function cargarGrupos() {
      try {
        let snap;
        try {
          snap = await getDocs(query(collection(db, 'grupos'), orderBy('creadoEn')));
        } catch {
          snap = await getDocs(collection(db, 'grupos'));
        }
        globalGrupos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      } catch (e) {
        globalGrupos = [];
        throw e;
      }
    }

    async function cargarMiParticipante() {
      const ref = doc(db, 'participantes', currentUser.uid);
      const snap = await getDoc(ref);
      miParticipante = snap.exists() ? { id: snap.id, ...snap.data() } : null;
    }

    async function cargarMisApuestas() {
      misApuestas = {};
      const q = query(collection(db, 'apuestas'), where('uid', '==', currentUser.uid));
      const snap = await getDocs(q);
      snap.forEach(d => {
        const data = { id: d.id, ...d.data() };
        if (data.partidoId) misApuestas[data.partidoId] = data;
      });
    }

    async function initApp() {
      try {
        await Promise.all([
          cargarPartidos(),
          cargarGrupos(),
          cargarMiParticipante(),
          cargarMisApuestas()
        ]);
        renderGrupos();
      } catch (e) {
        toast('Error cargando datos: ' + e.message, 'error');
      }
    }

        const tab = event.currentTarget.dataset.tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

    function renderGrupos() {
      const grid = document.getElementById('grupos-grid');
      const banner = document.getElementById('mi-grupo-banner');

      if (miParticipante?.estado === 'aprobado') {
        banner.innerHTML = `
          <div class="alert alert-success">
            <i class="fas fa-check-circle"></i>
            Estás en el grupo <strong>${miParticipante.grupoNombre || 'Sin nombre'}</strong>. Ya puedes ingresar tus apuestas.
          </div>
        `;
      } else if (miParticipante?.estado === 'pendiente') {
        banner.innerHTML = `
          <div class="alert alert-warn">
            <i class="fas fa-hourglass-half"></i>
            Tu solicitud al grupo <strong>${miParticipante.grupoNombre || 'Sin nombre'}</strong> está pendiente de aprobación.
          </div>
        `;
      } else if (miParticipante?.estado === 'rechazado') {
        banner.innerHTML = `
          <div class="alert alert-error">
            <i class="fas fa-circle-xmark"></i>
            Tu última solicitud fue rechazada. Puedes intentar en otro grupo.
          </div>
        `;
      } else {
        banner.innerHTML = `
          <div class="alert alert-info">
            <i class="fas fa-info-circle"></i>
            Selecciona un grupo para participar. Solo puedes unirte a uno.
          </div>
        `;
      }

      grid.innerHTML = '';

      if (!globalGrupos.length) {
        grid.innerHTML = `<div class="empty-state"><i class="fas fa-users-slash"></i><p>Aún no hay grupos creados.</p></div>`;
        return;
      }

      globalGrupos.forEach(g => {
        const esMio = miParticipante?.grupoId === g.id;
        const bloqueado = !!miParticipante && miParticipante?.estado !== 'rechazado' && !esMio;
        const btnDisabled = bloqueado || isCerrado();

        const div = document.createElement('div');
        div.className = 'grupo-card' + (esMio ? ' mi-grupo' : '');
        div.innerHTML = `
          ${esMio ? `<span class="badge badge-gold"><i class="fas fa-star"></i> Mi grupo</span>` : `<span class="badge badge-blue"><i class="fas fa-users"></i> Grupo</span>`}
          <h3>${g.nombre || 'Grupo sin nombre'}</h3>
          <p>${g.descripcion || 'Sin descripción'}</p>
          <div style="margin-top:16px;">
            ${
              esMio
                ? `<span class="badge ${miParticipante?.estado === 'aprobado' ? 'badge-green' : 'badge-gold'}">
                    <i class="fas ${miParticipante?.estado === 'aprobado' ? 'fa-check' : 'fa-clock'}"></i>
                    ${miParticipante?.estado || 'inscrito'}
                  </span>`
                : bloqueado
                  ? `<span style="color:var(--muted);font-size:.82rem;">Ya estás asociado a otro grupo</span>`
                  : `<button class="btn btn-gold btn-sm" ${btnDisabled ? 'disabled' : ''}>${isCerrado() ? 'Cerrado' : 'Unirse'}</button>`
            }
          </div>
        `;

       const joinBtn = div.querySelector('button');

       if (joinBtn) {
         console.log('Binding botón grupo', g.id, g.nombre);
         joinBtn.addEventListener('click', () => {
          console.log('CLICK botón grupo', g.id, g.nombre);
          unirseGrupo(g.id, g.nombre || 'grupo');
         });
       }

      grid.appendChild(div);
      });
    }

          {id:'fgK1',local:'Portugal',visita:'RD Congo',fecha:'17 jun',hora:'13:00',estadio:'NRG Stadium, Houston',grupo:'K'},
          {id:'fgK2',local:'Uzbekistan',visita:'Colombia',fecha:'17 jun',hora:'22:00',estadio:'Estadio Azteca, Ciudad de México',grupo:'K'},
          {id:'fgK3',local:'Portugal',visita:'Uzbekistan',fecha:'23 jun',hora:'13:00',estadio:'NRG Stadium, Houston',grupo:'K'},
          {id:'fgK4',local:'Colombia',visita:'RD Congo',fecha:'23 jun',hora:'22:00',estadio:'Estadio Akron, Guadalajara',grupo:'K'},
          {id:'fgK5',local:'Colombia',visita:'Portugal',fecha:'27 jun',hora:'19:30',estadio:'Hard Rock Stadium, Miami',grupo:'K'},
          {id:'fgK6',local:'RD Congo',visita:'Uzbekistan',fecha:'27 jun',hora:'19:30',estadio:'Mercedes-Benz Stadium, Atlanta',grupo:'K'},
        ],
        L:[
          {id:'fgL1',local:'Inglaterra',visita:'Croacia',fecha:'17 jun',hora:'16:00',estadio:'AT&T Stadium, Dallas',grupo:'L'},
          {id:'fgL2',local:'Ghana',visita:'Panama',fecha:'17 jun',hora:'19:00',estadio:'BMO Field, Toronto',grupo:'L'},
          {id:'fgL3',local:'Inglaterra',visita:'Ghana',fecha:'23 jun',hora:'16:00',estadio:'Gillette Stadium, Boston',grupo:'L'},
          {id:'fgL4',local:'Panama',visita:'Croacia',fecha:'23 jun',hora:'19:00',estadio:'BMO Field, Toronto',grupo:'L'},
          {id:'fgL5',local:'Panama',visita:'Inglaterra',fecha:'27 jun',hora:'17:00',estadio:'MetLife Stadium, Nueva York',grupo:'L'},
          {id:'fgL6',local:'Croacia',visita:'Ghana',fecha:'27 jun',hora:'17:00',estadio:'Lincoln Financial Field, Filadelfia',grupo:'L'},
        ],
      };

      // Enriquecer fixture con resultados reales de Firestore
      const firestoreById = {};
      globalPartidos.forEach(m => { firestoreById[m.id] = m; });

      // Fases eliminatorias
      const FASES_ELIM = [
        {id:'r32avos', label:'32avos de Final', sublabel:'1–8 jul · 16 partidos',
         ids:['r32_1','r32_2','r32_3','r32_4','r32_5','r32_6','r32_7','r32_8','r32_9','r32_10','r32_11','r32_12','r32_13','r32_14','r32_15','r32_16']},
        {id:'octavos', label:'Octavos de Final', sublabel:'11–14 jul · 8 partidos',
         ids:['r16_1','r16_2','r16_3','r16_4','r16_5','r16_6','r16_7','r16_8']},
        {id:'cuartos', label:'Cuartos de Final', sublabel:'18–19 jul · 4 partidos',
         ids:['qf1','qf2','qf3','qf4']},
        {id:'semis', label:'Semifinales', sublabel:'22–23 jul · 2 partidos',
         ids:['sf1','sf2']},
        {id:'tercero', label:'Tercer Lugar', sublabel:'25 jul',
         ids:['3p']},
        {id:'final', label:'Gran Final 🏆', sublabel:'26 jul · MetLife Stadium',
         ids:['fin']},
      ];

      // ── Construir fila de partido ──────────────────────────────────────
      function buildPartidoRow(base) {
        const fs  = firestoreById[base.id] || {};
        const p   = { ...base, ...fs };
        const apuesta = misApuestas[p.id];
        const tieneApuesta = !!apuesta;

        const tieneReal = p.resultado_local != null && p.resultado_visita != null;
        const puntaje = apuesta?.puntaje ?? (
          tieneReal && tieneApuesta
            ? calcularPuntaje(
                { local: p.resultado_local, visita: p.resultado_visita },
                { local: apuesta.golesLocal, visita: apuesta.golesVisita }
              )
            : null
        );

        const ptsClass = puntaje != null ? `pts-${puntaje}` : '';
        const ptsLabel = puntaje != null ? `${puntaje} pt${puntaje===1?'':'s'}` : '';

        const localNombre  = p.local  || 'Por definir';
        const visitaNombre = p.visita || 'Por definir';
        const horaStr = p.hora || '';
        const fechaStr = p.fecha || '';

        return `
          <div class="partido-row ${tieneApuesta?'tiene-apuesta':''}" id="prow-${p.id}">
            <div class="partido-row-inner">
              <div class="team-name">
                <span style="font-size:1.2rem">${getFlag(localNombre)}</span>
                <span>${localNombre}</span>
              </div>

              <div class="score-inputs">
                <div class="score-inputs-row">
                  <input type="number" min="0" max="20" class="score-input" id="local-${p.id}"
                    value="${tieneApuesta ? apuesta.golesLocal : ''}" placeholder="–" ${cerrado?'disabled':''}>
                  <span class="score-sep">:</span>
                  <input type="number" min="0" max="20" class="score-input" id="visita-${p.id}"
                    value="${tieneApuesta ? apuesta.golesVisita : ''}" placeholder="–" ${cerrado?'disabled':''}>
                </div>
                <span class="score-date">${fechaStr}${horaStr?' · '+horaStr:''}</span>
              </div>

              <div class="team-name right">
                <span>${visitaNombre}</span>
                <span style="font-size:1.2rem">${getFlag(visitaNombre)}</span>
              </div>

              <div class="partido-acciones">
                ${ptsLabel ? `<span class="pts-badge ${ptsClass}">${ptsLabel}</span>` : ''}
                ${tieneReal ? `<span class="resultado-real">${p.resultado_local}–${p.resultado_visita}</span>` : ''}
                ${!cerrado ? `<button class="save-btn" id="save-${p.id}" disabled><i class="fas fa-save"></i> Guardar</button>` : ''}
                ${tieneApuesta && !ptsLabel ? `<span style="font-size:.65rem;color:var(--green);"><i class="fas fa-check"></i> Guardado</span>` : ''}
              </div>
            </div>
            <div class="partido-meta">
              <span><i class="fas fa-location-dot"></i> ${p.estadio||'TBD'}</span>
              ${tieneReal&&tieneApuesta&&puntaje===null?`<span style="color:var(--muted);font-size:.65rem;">Puntaje pendiente</span>`:''}
            </div>
          </div>`;
      }

      // ── Construir HTML ─────────────────────────────────────────────────
      let html = '';
      if(cerrado) html += `<div class="cerrado-banner"><i class="fas fa-lock"></i> Las apuestas están cerradas. Solo puedes ver tus predicciones.</div>`;

      // Grupos — acordeón + tabs
      const gruposKeys = Object.keys(FG).sort();
      const apuestasGruposTotal = gruposKeys.flatMap(g => FG[g]).filter(p => misApuestas[p.id]).length;
      const totalGrupos = gruposKeys.flatMap(g => FG[g]).length;
      const okG = apuestasGruposTotal === totalGrupos && totalGrupos > 0;

      html += `<div class="fase-block">
        <div class="fase-header open" id="fh-grupos" onclick="toggleFaseApuestas('grupos')">
          <div class="fase-header-left">
            <div class="fase-icon fase-icon-grupos"><i class="fas fa-layer-group"></i></div>
            <div>
              <div class="fase-label">Fase de Grupos</div>
              <div class="fase-sublabel">12 – 26 jun · 12 grupos · 72 partidos</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <span class="fase-progress ${okG?'completo':''}">${okG?'✓ Completo':apuestasGruposTotal+'/'+totalGrupos+' apostados'}</span>
            <i class="fas fa-chevron-down fase-chevron"></i>
          </div>
        </div>
        <div class="fase-body open" id="fb-grupos">
          <div class="grupo-tabs-wrap" id="gtabs-grupos">`;

      gruposKeys.forEach((g, i) => {
        const apostados = FG[g].filter(p => misApuestas[p.id]).length;
        const tot = FG[g].length;
        const ok  = apostados === tot && tot > 0;
        html += `<button class="grupo-tab${i===0?' active':''}" data-grupo="${g}">
          Grupo ${g} <span class="gtab-check">${ok?'✓':apostados+'/'+tot}</span>
        </button>`;
      });

      html += `</div>`; // close tabs-wrap

      gruposKeys.forEach((g, i) => {
        html += `<div class="grupo-panel${i===0?' active':''}" id="gpanel-${g}">`;
        FG[g].forEach(base => { html += buildPartidoRow(base); });
        html += `</div>`;
      });

      html += `</div></div>`; // close fase-body + fase-block

      // Fases eliminatorias
      FASES_ELIM.forEach(fase => {
        const apostados = fase.ids.filter(id => misApuestas[id]).length;
        const tot = fase.ids.length;
        const ok  = apostados === tot && tot > 0;
        html += `<div class="fase-block">
          <div class="fase-header" id="fh-${fase.id}" onclick="toggleFaseApuestas('${fase.id}')">
            <div class="fase-header-left">
              <div class="fase-icon fase-icon-elim"><i class="fas fa-trophy"></i></div>
              <div>
                <div class="fase-label">${fase.label}</div>
                <div class="fase-sublabel">${fase.sublabel}</div>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
              <span class="fase-progress ${ok?'completo':''}">${ok?'✓ Completo':apostados+'/'+tot+' apostados'}</span>
              <i class="fas fa-chevron-down fase-chevron"></i>
            </div>
          </div>
          <div class="fase-body" id="fb-${fase.id}">
            <div class="fase-partidos-wrap">`;

        fase.ids.forEach(id => {
          const fs = firestoreById[id];
          if(fs) html += buildPartidoRow(fs);
          else   html += buildPartidoRow({id, local:'Por confirmar', visita:'Por confirmar', fecha:'–', estadio:'–'});
        });

        html += `</div></div></div>`;
      });

      container.innerHTML = html || `<div class="empty-state"><i class="fas fa-futbol"></i><p>No hay partidos cargados aún.</p></div>`;

      // ── Eventos tabs de grupo ──────────────────────────────────────────
      container.querySelectorAll('.grupo-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          container.querySelectorAll('.grupo-tab').forEach(t => t.classList.remove('active'));
          container.querySelectorAll('.grupo-panel').forEach(p => p.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById(`gpanel-${tab.dataset.grupo}`)?.classList.add('active');
        });
      });

      // ── Eventos inputs/guardar ─────────────────────────────────────────
      if(!cerrado) {
        globalPartidos.forEach(p => {
          const l   = document.getElementById(`local-${p.id}`);
          const v   = document.getElementById(`visita-${p.id}`);
          const btn = document.getElementById(`save-${p.id}`);
          if(l && v && btn) {
            const enable = () => { btn.disabled = false; };
            l.addEventListener('input', enable);
            v.addEventListener('input', enable);
            btn.addEventListener('click', () => guardarApuesta(p));
          }
        });
        // También bindear partidos del fixture local (grupos) que pueden no estar en globalPartidos
        Object.values(FG).flat().forEach(base => {
          const l   = document.getElementById(`local-${base.id}`);
          const v   = document.getElementById(`visita-${base.id}`);
          const btn = document.getElementById(`save-${base.id}`);
          if(l && v && btn && !btn.dataset.bound) {
            btn.dataset.bound = '1';
            const enable = () => { btn.disabled = false; };
            l.addEventListener('input', enable);
            v.addEventListener('input', enable);
            const merged = { ...base, ...(firestoreById[base.id]||{}) };
            btn.addEventListener('click', () => guardarApuesta(merged));
          }
        });
      }
    }

    window.toggleFaseApuestas = function(id) {
      const h = document.getElementById('fh-' + id);
      const b = document.getElementById('fb-' + id);
      if(h) h.classList.toggle('open');
      if(b) b.classList.toggle('open');
    };

    async function guardarApuesta(partido) {
      const l = document.getElementById(`local-${partido.id}`).value;
      const v = document.getElementById(`visita-${partido.id}`).value;

      if (l === '' || v === '') return toast('Ingresa ambos resultados', 'warn');

      const existente = misApuestas[partido.id];
      const payload = {
        uid: currentUser.uid,
        nombre: currentUser.displayName || currentUser.email || 'Usuario',
        email: currentUser.email || '',
        grupoId: miParticipante.grupoId,
        grupoNombre: miParticipante.grupoNombre,
        partidoId: partido.id,
        fase: partido.fase || (partido.grupo ? `Grupo ${partido.grupo}` : 'General'),
        numeroPartido: Number(partido.numero || 0),
        golesLocal: Number(l),
        golesVisita: Number(v),
        actualizadoEn: serverTimestamp()
      };

      if (partido.resultado_local != null && partido.resultado_visita != null) {
        payload.puntaje = calcularPuntaje(
          { local: partido.resultado_local, visita: partido.resultado_visita },
          { local: Number(l), visita: Number(v) }
        );
      }

      try {
        if (existente?.id) {
          await updateDoc(doc(db, 'apuestas', existente.id), payload);
        } else {
          payload.creadoEn = serverTimestamp();
          await addDoc(collection(db, 'apuestas'), payload);
        }

        await cargarMisApuestas();
        await renderApuestas();
        toast('Apuesta guardada', 'success');
      } catch (e) {
        toast(e.message, 'error');
      }
    }

    async function renderRanking() {
      const container = document.getElementById('ranking-content');

      if (!miParticipante) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-lock"></i><p>Únete a un grupo para ver el ranking.</p></div>`;
        return;
      }

      container.innerHTML = `<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Cargando ranking...</p></div>`;

      try {
        const participantesSnap = await getDocs(query(
          collection(db, 'participantes'),
          where('grupoId', '==', miParticipante.grupoId)
        ));

        const participantes = participantesSnap.docs
          .map(d => ({ id: d.id, ...d.data() }))
          .filter(p => p.estado === 'aprobado');

        if (!participantes.length) {
          container.innerHTML = `<div class="empty-state"><i class="fas fa-users"></i><p>Aún no hay participantes aprobados en este grupo.</p></div>`;
          return;
        }

        const apuestasSnap = await getDocs(query(
          collection(db, 'apuestas'),
          where('grupoId', '==', miParticipante.grupoId)
        ));

        const acumulado = {};
        participantes.forEach(p => {
          acumulado[p.uid || p.id] = {
            uid: p.uid || p.id,
            nombre: p.nombre || p.email || 'Jugador',
            total: 0,
            aciertos: 0
          };
        });

        apuestasSnap.forEach(d => {
          const a = d.data();
          const uid = a.uid;
          if (!acumulado[uid]) return;
          const pts = Number(a.puntaje ?? 0);
          acumulado[uid].total += pts;
          if (pts > 0) acumulado[uid].aciertos += 1;
        });

        const ranking = Object.values(acumulado)
          .sort((a,b) => b.total - a.total || b.aciertos - a.aciertos || a.nombre.localeCompare(b.nombre))
          .map((r, i) => ({ ...r, posicion: i + 1 }));

        const maxPts = ranking[0]?.total || 1;

        let html = `
          <div class="section-header"><h2>Ranking ${miParticipante.grupoNombre || ''}</h2></div>
          <table class="ranking-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Jugador</th>
                <th>Puntos</th>
                <th>Aciertos</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
        `;

        ranking.forEach(r => {
          const esTu = r.uid === currentUser.uid;
          const posClass = r.posicion <= 3 ? `pos-${r.posicion}` : 'pos-n';
          const pct = maxPts ? Math.round((r.total / maxPts) * 100) : 0;

          html += `
            <tr ${esTu ? 'style="background:rgba(245,200,66,.04)"' : ''}>
              <td><span class="pos-badge ${posClass}">${r.posicion}</span></td>
              <td style="font-weight:${esTu ? '700' : '400'};">
                ${r.nombre}
                ${esTu ? `<span class="badge badge-gold" style="padding:2px 8px;margin-left:6px;">Tú</span>` : ''}
              </td>
              <td style="font-weight:700;font-size:1.05rem;">${r.total}</td>
              <td style="color:var(--muted);">${r.aciertos || 0}</td>
              <td>
                <div class="score-bar-wrap">
                  <div class="score-bar"><div class="score-bar-fill" style="width:${pct}%"></div></div>
                </div>
              </td>
            </tr>
          `;
        });

        html += `</tbody></table>`;
        container.innerHTML = html;
      } catch (e) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>${e.message}</p></div>`;
      }
    }
  </script>
</body>
</html>
