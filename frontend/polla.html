  <style>

      --bg2:#0f1525;

      --gold:#f5c842;
      --gold2:#e8a800;
      --blue:#3b82f6;
      --green:#22c55e;
      --red:#ef4444;
      --text:#e8eaf0;
      --muted:#96a0b5;
      --radius:16px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'DM Sans',sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
    }

    .site-nav{
      background:#DA0015;
      border-bottom:3px solid #F0C040;
      padding:0 40px;
      height:62px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      position:sticky;
      top:0;
      z-index:200;
    }
    .site-nav-brand{
      display:flex;
      align-items:center;
      gap:12px;
      text-decoration:none;
    }
    .site-nav-logo{
      width:36px;height:36px;background:#F0C040;border-radius:50%;
      display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;
    }
    .site-nav-brand-text small{
      display:block;font-size:.58rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
      color:rgba(255,255,255,.6);font-family:'DM Sans',sans-serif;
    }
    .site-nav-brand-text strong{
      display:block;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;font-weight:800;
      color:#fff;letter-spacing:.04em;line-height:1;
    }
    .site-nav-links{display:flex;align-items:center;gap:4px}
    .site-nav-link{
      font-family:'Bebas Neue',sans-serif;
      font-size:.85rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
      color:rgba(255,255,255,.85);padding:7px 14px;border-radius:4px;text-decoration:none;
      transition:all .2s;border:1.5px solid transparent;
    }
    .site-nav-link:hover{color:#fff;background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2)}
    .site-nav-link.active-now{color:#F0C040}

    nav.app-nav{
      background:rgba(10,14,26,.92);
      backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
      padding:0 28px;
      height:64px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      position:sticky;
      top:0;
      z-index:100;
    }
    .nav-brand{
      font-family:'Bebas Neue',sans-serif;
      font-size:1.6rem;
      letter-spacing:.06em;
      color:var(--gold);
    }
    .nav-right{display:flex;align-items:center;gap:14px}
    .user-pill{
      display:flex;align-items:center;gap:10px;
      background:var(--card2);
      border:1px solid var(--border);
      border-radius:999px;
      padding:6px 14px 6px 8px;
      font-size:.85rem;
    }
    .user-avatar{
      width:30px;height:30px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);
      background:var(--card);
    }

    .btn{
      padding:9px 20px;border-radius:10px;border:none;
      font-family:'DM Sans',sans-serif;font-weight:600;font-size:.88rem;
      cursor:pointer;transition:all .2s;
    }
    .btn-gold{background:var(--gold);color:#0a0e1a}
    .btn-gold:hover{background:var(--gold2);transform:translateY(-1px)}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}
    .btn-outline:hover{border-color:var(--gold);color:var(--gold)}
    .btn-sm{padding:6px 14px;font-size:.8rem}

      align-items:center;
      justify-content:center;
      background:radial-gradient(ellipse at top, rgba(245,200,66,.12) 0%, transparent 55%, var(--bg) 100%);

    }
    .login-card{
      text-align:center;
      padding:52px 44px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:24px;
      max-width:420px;
      width:100%;
      box-shadow:0 32px 80px rgba(0,0,0,.5);
    }
    .login-icon{font-size:3.8rem;margin-bottom:16px;display:block}
    .login-card h1{
      font-family:'Bebas Neue',sans-serif;
      font-size:2.8rem;color:var(--gold);
      letter-spacing:.04em;margin-bottom:8px;
    }
    .login-card p{color:var(--muted);margin-bottom:32px;line-height:1.6}
    .btn-google{
      display:flex;align-items:center;justify-content:center;gap:12px;
      width:100%;padding:14px;background:#fff;color:#1f2937;border:none;border-radius:12px;
      font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;
    }
    .btn-google:hover{background:#f3f4f6;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}

    .tabs{
      display:flex;gap:4px;padding:20px 28px 0;border-bottom:1px solid var(--border);
    }
    .tab{
      padding:10px 20px;border-radius:10px 10px 0 0;font-weight:600;font-size:.88rem;cursor:pointer;
      color:var(--muted);border:none;background:transparent;transition:all .2s;position:relative;
    }
    .tab.active{color:var(--gold);background:var(--card)}
    .tab.active::after{
      content:"";position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--gold);
    }

    .main{padding:28px;max-width:1100px;margin:0 auto}
    .page{display:none}
    .page.active{display:block}

    .section-header{
      display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;
    }
    .section-header h2{
      font-family:'Bebas Neue',sans-serif;
      font-size:1.8rem;letter-spacing:.04em;color:var(--gold);
    }

    .alert{
      padding:12px 18px;border-radius:10px;font-size:.88rem;margin-bottom:20px;display:flex;align-items:center;gap:10px;
    }
    .alert-info{background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);color:#93c5fd}
    .alert-warn{background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.25);color:var(--gold)}

    .alert-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:var(--red)}

    }

      background:var(--card);border:2px solid var(--border);border-radius:var(--radius);

    }

.grupo-card .btn{

    .grupo-card .btn{
      position:relative;

    }
    .grupo-card:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.3)}

    .grupo-card h3{font-size:1.15rem;margin-bottom:6px}
    .grupo-card p{color:var(--muted);font-size:.85rem}

    .partido-row{

    .team-name.right{justify-content:flex-end;text-align:right;flex-direction:row-reverse}
    .score-inputs{display:flex;align-items:center;gap:8px}
    .score-input{

    .score-input:disabled{opacity:.45;cursor:not-allowed}
    .score-sep{color:var(--muted);font-weight:700}
    .partido-meta{
      grid-column:1 / -1;display:flex;justify-content:space-between;align-items:center;font-size:.76rem;color:var(--muted);
      margin-top:8px;padding-top:10px;border-top:1px solid var(--border);gap:10px;flex-wrap:wrap;
    }
    .save-btn{
      padding:6px 16px;background:var(--gold);color:#0a0e1a;border:none;border-radius:8px;
      font-weight:700;font-size:.78rem;cursor:pointer;transition:all .2s;
    }
    .save-btn:hover{background:var(--gold2)}
    .save-btn:disabled{opacity:.4;cursor:not-allowed}

    .pts-badge{
      display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:.75rem;font-weight:700;
    }
    .pts-4{background:rgba(245,200,66,.2);color:var(--gold)}
    .pts-3{background:rgba(59,130,246,.2);color:#60a5fa}
    .pts-2{background:rgba(34,197,94,.2);color:var(--green)}
    .pts-1{background:rgba(148,163,184,.2);color:#94a3b8}
    .pts-0{background:rgba(239,68,68,.15);color:var(--red)}

    .ranking-table{width:100%;border-collapse:collapse;margin-top:16px}
    .ranking-table th{
      text-align:left;padding:10px 16px;font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;

    .ranking-table td{

    .ranking-table tr:last-child td{border-bottom:none}
    .ranking-table tr:hover td{background:var(--card2)}
    .pos-badge{
      width:30px;height:30px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;

    .pos-1{background:rgba(245,200,66,.2);color:var(--gold)}
    .pos-2{background:rgba(148,163,184,.2);color:#94a3b8}
    .pos-3{background:rgba(205,127,50,.2);color:#cd7f32}

    .score-bar-wrap{display:flex;align-items:center;gap:10px}
    .score-bar{
      flex:1;height:6px;background:var(--card2);border-radius:999px;overflow:hidden;max-width:120px;
    }
    .score-bar-fill{
      height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));border-radius:999px;transition:width .6s ease;
    }

    .empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
    .empty-state i{font-size:2.5rem;margin-bottom:14px;display:block}

      background:linear-gradient(135deg, rgba(239,68,68,.1), rgba(239,68,68,.05));

      font-weight:600;margin-bottom:20px;display:flex;align-items:center;gap:10px;
    }

    #toast{
      position:fixed;bottom:28px;right:28px;background:var(--card2);border:1px solid var(--border);border-radius:12px;
      padding:14px 20px;font-size:.88rem;box-shadow:0 16px 40px rgba(0,0,0,.4);z-index:9999;
      opacity:0;transform:translateY(10px);transition:all .3s;max-width:340px;pointer-events:none;
    }
    #toast.show{opacity:1;transform:translateY(0)}

    @media (max-width:640px){
      .site-nav{padding:0 16px}
      .site-nav-links .site-nav-link{display:none}
      .main{padding:16px}
      .tabs{padding:16px 16px 0;overflow-x:auto}
      .partido-row{grid-template-columns:1fr;gap:10px}
      .team-name.right{flex-direction:row;justify-content:flex-start;text-align:left}
      .score-inputs{justify-content:center}
      nav.app-nav{padding:0 16px}

    function formatFecha(f, hora) {
      if (!f) return 'Fecha por definir';
      // ISO "2026-06-11" → parsear correctamente
      if (typeof f === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(f)) {
        const d = new Date(f + 'T12:00:00');
        const fecha = d.toLocaleDateString('es-CL', { day:'2-digit', month:'short' });
        return hora ? `${fecha} · ${hora}` : fecha;
      }
      // Ya formateado "11 jun" → devolver directo
      if (typeof f === 'string' && /^\d{1,2}\s+\w+/.test(f)) {
        return hora ? `${f} · ${hora}` : f;
      }
      // Número serial Excel → convertir
      if (typeof f === 'number' || (!isNaN(Number(f)) && String(f).match(/^\d+(\.\d+)?$/))) {
        const serial = Math.floor(Number(f));
        const d = new Date(Math.round((serial - 25569) * 86400 * 1000));
        if (!isNaN(d)) {
          const fecha = d.toLocaleDateString('es-CL', { day:'2-digit', month:'short' });
          return hora ? `${fecha} · ${hora}` : fecha;
        }
      }
      return hora ? `${String(f)} · ${hora}` : String(f);
    }

    function formatFechaHora(ts) {
      if (!ts) return '';
      try {
        const d = ts?.toDate ? ts.toDate() : new Date(ts);
        return d.toLocaleDateString('es-CL', { day:'2-digit', month:'short', year:'numeric' }) + ' ' +
               d.toLocaleTimeString('es-CL', { hour:'2-digit', minute:'2-digit' });
      } catch {
        return '';
      }
    }

    function calcularPuntaje(real, apuesta) {
      const rl = Number(real.local);
      const rv = Number(real.visita);
      const al = Number(apuesta.local);
      const av = Number(apuesta.visita);

      if ([rl,rv,al,av].some(v => Number.isNaN(v))) return null;

      const exacto = al === rl && av === rv;
      const empateReal = rl === rv;

      if (exacto && !empateReal) return 4;
      if (exacto && empateReal) return 2;

      const gr = rl > rv ? 'L' : rl < rv ? 'V' : 'E';
      const ga = al > av ? 'L' : al < av ? 'V' : 'E';

      if (gr === ga && gr !== 'E') return 3;
      if (gr === 'E' && ga === 'E') return 1;
      return 0;
    }

    async function cargarPartidos() {
      const snap = await getDocs(collection(db, 'partidos'));
      const firestoreById = {};
      snap.docs.forEach(d => { firestoreById[d.id] = { id: d.id, ...d.data() }; });

      // Merge: fixture base (orden+fecha+equipos garantizados) + Firestore (resultado real)
      globalPartidos = [...FIXTURE_GRUPOS, ...FIXTURE_ELIM].map(base => ({
        ...base,
        ...(firestoreById[base.id] || {}),
        // Siempre usar fecha/hora/local/visita del fixture (evita datos corruptos de Firestore)
        fecha:   base.fecha,
        hora:    base.hora,
        estadio: base.estadio,
        local:   firestoreById[base.id]?.local || base.local,
        visita:  firestoreById[base.id]?.visita || base.visita,
      }));
      // El orden ya viene del fixture (cronológico)
    }

    async function cargarGrupos() {
      try {
        let snap;
        try {
          snap = await getDocs(query(collection(db, 'grupos'), orderBy('creadoEn')));
        } catch {
          snap = await getDocs(collection(db, 'grupos'));
        }
        globalGrupos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      } catch (e) {
        globalGrupos = [];
        throw e;
      }
    }

    async function cargarMiParticipante() {
      const ref = doc(db, 'participantes', currentUser.uid);
      const snap = await getDoc(ref);
      miParticipante = snap.exists() ? { id: snap.id, ...snap.data() } : null;
    }

    async function cargarMisApuestas() {
      misApuestas = {};
      const q = query(collection(db, 'apuestas'), where('uid', '==', currentUser.uid));
      const snap = await getDocs(q);
      snap.forEach(d => {
        const data = { id: d.id, ...d.data() };
        if (data.partidoId) misApuestas[data.partidoId] = data;
      });
    }

        document.getElementById('app').style.display = 'none';
      }
    });

    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', async (event) => {
        const tab = event.currentTarget.dataset.tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.getElementById('tab-' + tab).classList.add('active');

        if (tab === 'apuestas') await renderApuestas();
        if (tab === 'ranking') await renderRanking();
      });
    });

    function renderGrupos() {
      const grid = document.getElementById('grupos-grid');
      const banner = document.getElementById('mi-grupo-banner');

      if (miParticipante?.estado === 'aprobado') {
        banner.innerHTML = `
          <div class="alert alert-success">
            <i class="fas fa-check-circle"></i>
            Estás en el grupo <strong>${miParticipante.grupoNombre || 'Sin nombre'}</strong>. Ya puedes ingresar tus apuestas.
          </div>
        `;
      } else if (miParticipante?.estado === 'pendiente') {
        banner.innerHTML = `
          <div class="alert alert-warn">
            <i class="fas fa-hourglass-half"></i>
            Tu solicitud al grupo <strong>${miParticipante.grupoNombre || 'Sin nombre'}</strong> está pendiente de aprobación.
          </div>
        `;
      } else if (miParticipante?.estado === 'rechazado') {
        banner.innerHTML = `
          <div class="alert alert-error">
            <i class="fas fa-circle-xmark"></i>
            Tu última solicitud fue rechazada. Puedes intentar en otro grupo.
          </div>
        `;
      } else {
        banner.innerHTML = `
          <div class="alert alert-info">
            <i class="fas fa-info-circle"></i>
            Selecciona un grupo para participar. Solo puedes unirte a uno.
          </div>
        `;
      }

      grid.innerHTML = '';

      if (!globalGrupos.length) {
        grid.innerHTML = `<div class="empty-state"><i class="fas fa-users-slash"></i><p>Aún no hay grupos creados.</p></div>`;
        return;
      }

      globalGrupos.forEach(g => {
        const esMio = miParticipante?.grupoId === g.id;
        const bloqueado = !!miParticipante && miParticipante?.estado !== 'rechazado' && !esMio;
        const btnDisabled = bloqueado || isCerrado();

        const div = document.createElement('div');
        div.className = 'grupo-card' + (esMio ? ' mi-grupo' : '');
        div.innerHTML = `
          ${esMio ? `<span class="badge badge-gold"><i class="fas fa-star"></i> Mi grupo</span>` : `<span class="badge badge-blue"><i class="fas fa-users"></i> Grupo</span>`}
          <h3>${g.nombre || 'Grupo sin nombre'}</h3>
          <p>${g.descripcion || 'Sin descripción'}</p>
          <div style="margin-top:16px;">
            ${
              esMio
                ? `<span class="badge ${miParticipante?.estado === 'aprobado' ? 'badge-green' : 'badge-gold'}">
                    <i class="fas ${miParticipante?.estado === 'aprobado' ? 'fa-check' : 'fa-clock'}"></i>
                    ${miParticipante?.estado || 'inscrito'}
                  </span>`
                : bloqueado
                  ? `<span style="color:var(--muted);font-size:.82rem;">Ya estás asociado a otro grupo</span>`
                  : `<button class="btn btn-gold btn-sm" ${btnDisabled ? 'disabled' : ''}>${isCerrado() ? 'Cerrado' : 'Unirse'}</button>`
            }
          </div>
        `;

       const joinBtn = div.querySelector('button');

       if (joinBtn) {
         console.log('Binding botón grupo', g.id, g.nombre);
         joinBtn.addEventListener('click', () => {
          console.log('CLICK botón grupo', g.id, g.nombre);
          unirseGrupo(g.id, g.nombre || 'grupo');
         });
       }

      grid.appendChild(div);
      });
    }

    async function unirseGrupo(grupoId, nombreGrupo) {
  if (isCerrado()) {
    console.warn('Inscripciones cerradas');
    return toast('Las inscripciones están cerradas', 'warn');
  }

  console.log('CLICK unirseGrupo', {
    grupoId,
    nombreGrupo,
    uid: currentUser?.uid,
    email: currentUser?.email,
    miParticipanteActual: miParticipante
  });

  try {
    const ref = doc(db, 'participantes', currentUser.uid);

    const payload = {
      uid: currentUser.uid,
      nombre: currentUser.displayName || currentUser.email || 'Usuario',
      email: currentUser.email || '',
      grupoId,
      grupoNombre: nombreGrupo,
      estado: 'pendiente',
      unidoEn: serverTimestamp()
    };

    console.log('Guardando participante', payload);

    await setDoc(ref, payload, { merge: true });

    console.log('setDoc OK');

    await cargarMiParticipante();

    console.log('miParticipante luego de guardar', miParticipante);

    renderGrupos();
    toast(`Solicitud enviada a ${nombreGrupo}`, 'success');
  } catch (e) {
    console.error('Error al unirse al grupo:', e);
    alert('Error al unirse al grupo: ' + (e?.message || e));
    toast(e?.message || 'Error al unirse al grupo', 'error');
  }
}
    // ── CSS del acordeon (inyectado aqui por conveniencia) ────────────────
    // ── Helpers acordeon ───────────────────────────────────────────────────

    function buildApRow(p, cerrado) {
      const apuesta   = misApuestas[p.id];
      const tieneAp   = !!apuesta;
      const resLocal  = p.resultado_local  ?? p.goles_local  ?? null;
      const resVisita = p.resultado_visita ?? p.goles_visita ?? null;
      const puntaje   = tieneAp
        ? (apuesta.puntaje ?? (resLocal != null && resVisita != null
            ? calcularPuntaje({local:resLocal,visita:resVisita},{local:apuesta.golesLocal,visita:apuesta.golesVisita})
            : null))
        : null;

      const localNombre  = p.local  || 'Por confirmar';
      const visitaNombre = p.visita || 'Por confirmar';
      const esElimPH = !p.grupo && ['G.','1.','2.','3er','Por con','Gan','Per'].some(x => localNombre.startsWith(x));

      const ptsPill   = puntaje != null
        ? `<span class="pts-badge pts-${puntaje}">${puntaje} pt${puntaje===1?'':'s'}</span>` : '';
      const realBadge = resLocal != null && resVisita != null
        ? `<span class="real-badge"><i class="fas fa-check-circle"></i> ${resLocal}-${resVisita}</span>` : '';

      return `<div class="ap-row${tieneAp ? ' tiene-apuesta' : ''}">
        <div class="team-name">
          <span style="font-size:1.3rem">${esElimPH ? '&#9647;' : getFlag(localNombre)}</span>
          <span class="${esElimPH ? 'ph-team' : ''}">${localNombre}</span>
        </div>
        <div class="ap-center">
          <div class="score-inputs">
            <input type="number" min="0" max="20" class="score-input" id="local-${p.id}"
              value="${tieneAp ? apuesta.golesLocal : ''}" placeholder="-" ${cerrado ? 'disabled' : ''}>
            <span class="score-sep">-</span>
            <input type="number" min="0" max="20" class="score-input" id="visita-${p.id}"
              value="${tieneAp ? apuesta.golesVisita : ''}" placeholder="-" ${cerrado ? 'disabled' : ''}>
          </div>
          <span class="ap-fecha">${formatFecha(p.fecha, p.hora)}</span>
        </div>
        <div class="team-name right">
          <span class="${esElimPH ? 'ph-team' : ''}">${visitaNombre}</span>
          <span style="font-size:1.3rem">${esElimPH ? '&#9647;' : getFlag(visitaNombre)}</span>
        </div>
        <div class="partido-meta">
          <span><i class="fas fa-location-dot"></i> ${p.estadio || 'TBD'}</span>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            ${realBadge}${ptsPill}
            ${!cerrado ? `<button class="save-btn" id="save-${p.id}" disabled>Guardar</button>` : ''}
          </div>
        </div>
      </div>`;
    }

    function buildFaseAcc(id, icon, iconClass, title, sub, comp, tot, openNow) {
      const pct      = tot > 0 ? Math.round(comp/tot*100) : 0;
      const badgeCls = pct===100 && tot>0 ? 'completo' : pct>0 ? 'parcial' : '';
      const badgeTxt = pct===100 && tot>0 ? 'Completo' : comp+'/'+tot;
      return `<div class="fase-acc" id="facc-${id}">
        <div class="fase-acc-header${openNow?' open':''}" onclick="toggleAcc('${id}')">
          <div class="fase-acc-left">
            <div class="fase-acc-icon ${iconClass}"><i class="${icon}"></i></div>
            <div><div class="fase-acc-title">${title}</div><div class="fase-acc-sub">${sub}</div></div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <span class="fase-acc-badge ${badgeCls}">${badgeTxt}</span>
            <i class="fas fa-chevron-down fase-acc-chevron"></i>
          </div>
        </div>`;
    }

    window.toggleAcc = function(id) {
      document.getElementById('facc-'+id)?.querySelector('.fase-acc-header')?.classList.toggle('open');
      document.getElementById('faccB-'+id)?.classList.toggle('open');
    };

    window.switchGrupoTab = function(el, g) {
      document.querySelectorAll('#gtabs-grupos .gtab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('[id^="gpanel-"]').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('gpanel-'+g)?.classList.add('active');
      el.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
    };

    const FASES_ELIM_POLLA = [
      {id:'32avos',  label:'32avos de Final',    sub:'1-8 jul · 16 partidos',    icon:'fas fa-circle-nodes',      iconClass:'fase-acc-icon-32avos',
       ids:['r32_1','r32_2','r32_3','r32_4','r32_5','r32_6','r32_7','r32_8','r32_9','r32_10','r32_11','r32_12','r32_13','r32_14','r32_15','r32_16']},
      {id:'octavos', label:'Octavos de Final',    sub:'11-14 jul · 8 partidos',   icon:'fas fa-shield-halved',     iconClass:'fase-acc-icon-octavos',
       ids:['r16_1','r16_2','r16_3','r16_4','r16_5','r16_6','r16_7','r16_8']},
      {id:'cuartos', label:'Cuartos de Final',    sub:'18-19 jul · 4 partidos',   icon:'fas fa-trophy',            iconClass:'fase-acc-icon-cuartos',
       ids:['qf1','qf2','qf3','qf4']},
      {id:'semis',   label:'Semifinales',          sub:'22-23 jul · 2 partidos',   icon:'fas fa-star-half-stroke',  iconClass:'fase-acc-icon-semis',
       ids:['sf1','sf2']},
      {id:'tercero', label:'Tercer Lugar',          sub:'25 jul',                   icon:'fas fa-medal',             iconClass:'fase-acc-icon-32avos', ids:['3p']},
      {id:'final',   label:'Gran Final',            sub:'26 jul · MetLife Stadium', icon:'fas fa-crown',             iconClass:'fase-acc-icon-final',   ids:['fin']},
    ];

    const GRP_IDS = {
      A:['fgA1','fgA2','fgA3','fgA4','fgA5','fgA6'], B:['fgB1','fgB2','fgB3','fgB4','fgB5','fgB6'],
      C:['fgC1','fgC2','fgC3','fgC4','fgC5','fgC6'], D:['fgD1','fgD2','fgD3','fgD4','fgD5','fgD6'],
      E:['fgE1','fgE2','fgE3','fgE4','fgE5','fgE6'], F:['fgF1','fgF2','fgF3','fgF4','fgF5','fgF6'],
      G:['fgG1','fgG2','fgG3','fgG4','fgG5','fgG6'], H:['fgH1','fgH2','fgH3','fgH4','fgH5','fgH6'],
      I:['fgI1','fgI2','fgI3','fgI4','fgI5','fgI6'], J:['fgJ1','fgJ2','fgJ3','fgJ4','fgJ5','fgJ6'],
      K:['fgK1','fgK2','fgK3','fgK4','fgK5','fgK6'], L:['fgL1','fgL2','fgL3','fgL4','fgL5','fgL6'],
    };
    const GRUPOS = ['A','B','C','D','E','F','G','H','I','J','K','L'];

    async function renderApuestas() {
      const container = document.getElementById('apuestas-content');

      if (!miParticipante) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-lock"></i><p>Primero debes unirte a un grupo.</p></div>';
        return;
      }
      if (miParticipante.estado !== 'aprobado') {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-hourglass-half"></i><p>Tu participacion aun no esta aprobada.</p></div>';
        return;
      }

      await cargarMisApuestas();
      const cerrado = isCerrado();
      const pMap = {};
      globalPartidos.forEach(p => { pMap[p.id] = p; });

      const totalGrupos = GRUPOS.reduce((s,g) => s + GRP_IDS[g].length, 0);
      const compGrupos  = GRUPOS.reduce((s,g) => s + GRP_IDS[g].filter(id => !!misApuestas[id]).length, 0);

      let html = cerrado
        ? '<div class="cerrado-banner"><i class="fas fa-lock"></i> Apuestas cerradas - Solo visualizacion</div>'
        : '';

      // Acordeon Fase de Grupos
      html += buildFaseAcc('grupos','fas fa-layer-group','fase-acc-icon-grupos',
        'Fase de Grupos','12-26 jun · 12 grupos · 72 partidos', compGrupos, totalGrupos, true);
      html += '<div class="fase-acc-body open" id="faccB-grupos">';
      html += '<div class="grupo-tabs-scroll" id="gtabs-grupos">';
      GRUPOS.forEach((g, i) => {
        const comp = GRP_IDS[g].filter(id => !!misApuestas[id]).length;
        const tot  = GRP_IDS[g].length;
        html += '<button class="gtab'+(i===0?' active':'')+'" onclick="switchGrupoTab(this,\''+g+'\')">Grupo '+g+' <span style="font-size:.65rem;opacity:.8;">'+(comp===tot?'&#10003;':comp+'/'+tot)+'</span></button>';
      });
      html += '</div>';
      GRUPOS.forEach((g, i) => {
        html += '<div class="grupo-panel'+(i===0?' active':'')+'" id="gpanel-'+g+'"><div class="partidos-panel-wrap">';
        GRP_IDS[g].forEach(id => {
          const p = pMap[id] || FIXTURE_MAP[id];
          if (p) html += buildApRow(p, cerrado);
        });
        html += '</div></div>';
      });
      html += '</div></div>';

      // Acordeones fases eliminatorias
      FASES_ELIM_POLLA.forEach(fase => {
        const comp = fase.ids.filter(id => !!misApuestas[id]).length;
        html += buildFaseAcc(fase.id, fase.icon, fase.iconClass, fase.label, fase.sub, comp, fase.ids.length, false);
        html += '<div class="fase-acc-body" id="faccB-'+fase.id+'"><div class="partidos-panel-wrap">';
        fase.ids.forEach(id => {
          const p = pMap[id] || FIXTURE_MAP[id];
          if (p) html += buildApRow(p, cerrado);
        });
        html += '</div></div></div>';
      });

      container.innerHTML = html || '<div class="empty-state"><i class="fas fa-futbol"></i><p>No hay partidos cargados.</p></div>';

      if (!cerrado) {
        const seen = new Set();
        [...globalPartidos, ...Object.values(FIXTURE_MAP)].forEach(p => {
          if (seen.has(p.id)) return; seen.add(p.id);
          const l   = document.getElementById('local-'+p.id);
          const v   = document.getElementById('visita-'+p.id);
          const btn = document.getElementById('save-'+p.id);
          if (l && v && btn) {
            const chk = () => { btn.disabled = l.value==='' || v.value===''; };
            l.addEventListener('input', chk);
            v.addEventListener('input', chk);
            btn.addEventListener('click', () => guardarApuesta(pMap[p.id] || FIXTURE_MAP[p.id]));
          }
        });
      }
    }


    async function guardarApuesta(partido) {
      const l = document.getElementById(`local-${partido.id}`).value;
      const v = document.getElementById(`visita-${partido.id}`).value;

      if (l === '' || v === '') return toast('Ingresa ambos resultados', 'warn');

      const existente = misApuestas[partido.id];
      const payload = {
        uid: currentUser.uid,
        nombre: currentUser.displayName || currentUser.email || 'Usuario',
        email: currentUser.email || '',
        grupoId: miParticipante.grupoId,
        grupoNombre: miParticipante.grupoNombre,
        partidoId: partido.id,
        fase: partido.fase || (partido.grupo ? `Grupo ${partido.grupo}` : 'General'),
        numeroPartido: Number(partido.numero || 0),
        golesLocal: Number(l),
        golesVisita: Number(v),
        actualizadoEn: serverTimestamp()
      };

      const resL = partido.resultado_local  ?? partido.goles_local  ?? null;
      const resV = partido.resultado_visita ?? partido.goles_visita ?? null;
      if (resL != null && resV != null) {
        payload.puntaje = calcularPuntaje(
          { local: resL, visita: resV },
          { local: Number(l), visita: Number(v) }
        );
      }

      try {
        if (existente?.id) {
          await updateDoc(doc(db, 'apuestas', existente.id), payload);
        } else {
          payload.creadoEn = serverTimestamp();
          await addDoc(collection(db, 'apuestas'), payload);
        }

        await cargarMisApuestas();
        await renderApuestas();
        toast('Apuesta guardada', 'success');
      } catch (e) {
        toast(e.message, 'error');
      }
    }

    async function renderRanking() {
      const container = document.getElementById('ranking-content');

      if (!miParticipante) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-lock"></i><p>Únete a un grupo para ver el ranking.</p></div>`;
        return;
      }

      container.innerHTML = `<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Cargando ranking...</p></div>`;

      try {
        const participantesSnap = await getDocs(query(
          collection(db, 'participantes'),
          where('grupoId', '==', miParticipante.grupoId)
        ));

        const participantes = participantesSnap.docs
          .map(d => ({ id: d.id, ...d.data() }))
          .filter(p => p.estado === 'aprobado');

        if (!participantes.length) {
          container.innerHTML = `<div class="empty-state"><i class="fas fa-users"></i><p>Aún no hay participantes aprobados en este grupo.</p></div>`;
          return;
        }

        const apuestasSnap = await getDocs(query(
          collection(db, 'apuestas'),
          where('grupoId', '==', miParticipante.grupoId)
        ));

        const acumulado = {};
        participantes.forEach(p => {
          acumulado[p.uid || p.id] = {
            uid: p.uid || p.id,
            nombre: p.nombre || p.email || 'Jugador',
            total: 0,
            aciertos: 0
          };
        });

        apuestasSnap.forEach(d => {
          const a = d.data();
          const uid = a.uid;
          if (!acumulado[uid]) return;
          const pts = Number(a.puntaje ?? 0);
          acumulado[uid].total += pts;
          if (pts > 0) acumulado[uid].aciertos += 1;
        });

        const ranking = Object.values(acumulado)
          .sort((a,b) => b.total - a.total || b.aciertos - a.aciertos || a.nombre.localeCompare(b.nombre))
          .map((r, i) => ({ ...r, posicion: i + 1 }));

        const maxPts = ranking[0]?.total || 1;

        let html = `
          <div class="section-header"><h2>Ranking ${miParticipante.grupoNombre || ''}</h2></div>
          <table class="ranking-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Jugador</th>
                <th>Puntos</th>
                <th>Aciertos</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
        `;

        ranking.forEach(r => {
          const esTu = r.uid === currentUser.uid;
          const posClass = r.posicion <= 3 ? `pos-${r.posicion}` : 'pos-n';
          const pct = maxPts ? Math.round((r.total / maxPts) * 100) : 0;

          html += `
            <tr ${esTu ? 'style="background:rgba(245,200,66,.04)"' : ''}>
              <td><span class="pos-badge ${posClass}">${r.posicion}</span></td>
              <td style="font-weight:${esTu ? '700' : '400'};">
                ${r.nombre}
                ${esTu ? `<span class="badge badge-gold" style="padding:2px 8px;margin-left:6px;">Tú</span>` : ''}
              </td>
              <td style="font-weight:700;font-size:1.05rem;">${r.total}</td>
              <td style="color:var(--muted);">${r.aciertos || 0}</td>
              <td>
                <div class="score-bar-wrap">
                  <div class="score-bar"><div class="score-bar-fill" style="width:${pct}%"></div></div>
                </div>
              </td>
            </tr>
          `;
        });

        html += `</tbody></table>`;
        container.innerHTML = html;
      } catch (e) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>${e.message}</p></div>`;
      }
    }
  </script>
