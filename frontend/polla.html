<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <title>La Polla 2026</title>

  <style>
    :root{
      --bg:#0a0e1a;
      --bg2:#0f1525;
      --card:#141b2d;
      --card2:#1a2238;
      --border:rgba(255,255,255,0.07);
      --gold:#f5c842;
      --gold2:#e8a800;
      --blue:#3b82f6;
      --green:#22c55e;
      --red:#ef4444;
      --text:#e8eaf0;
      --muted:#96a0b5;
      --radius:16px;

    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'DM Sans',sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;

    .site-nav{
      background:#DA0015;
      border-bottom:3px solid #F0C040;
      padding:0 40px;
      height:62px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      position:sticky;
      top:0;
      z-index:200;
    }
    .site-nav-brand{
      display:flex;
      align-items:center;
      gap:12px;
      text-decoration:none;
    }
    .site-nav-logo{
      width:36px;height:36px;background:#F0C040;border-radius:50%;
      display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;
    }
    .site-nav-brand-text small{
      display:block;font-size:.58rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
      color:rgba(255,255,255,.6);font-family:'DM Sans',sans-serif;
    }
    .site-nav-brand-text strong{
      display:block;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;font-weight:800;
      color:#fff;letter-spacing:.04em;line-height:1;
    }
    .site-nav-links{display:flex;align-items:center;gap:4px}
    .site-nav-link{
      font-family:'Bebas Neue',sans-serif;
      font-size:.85rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
      color:rgba(255,255,255,.85);padding:7px 14px;border-radius:4px;text-decoration:none;
      transition:all .2s;border:1.5px solid transparent;
    }
    .site-nav-link:hover{color:#fff;background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2)}
    .site-nav-link.active-now{color:#F0C040}

    nav.app-nav{
      background:rgba(10,14,26,.92);
      backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
      padding:0 28px;
      height:64px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      position:sticky;
      top:0;
      z-index:100;
    }
    .nav-brand{
      font-family:'Bebas Neue',sans-serif;
      font-size:1.6rem;
      letter-spacing:.06em;
      color:var(--gold);
    }
    .nav-right{display:flex;align-items:center;gap:14px}
    .user-pill{
      display:flex;align-items:center;gap:10px;
      background:var(--card2);
      border:1px solid var(--border);
      border-radius:999px;
      padding:6px 14px 6px 8px;
      font-size:.85rem;
    }
    .user-avatar{
      width:30px;height:30px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);
      background:var(--card);
    }

    .btn{
      padding:9px 20px;border-radius:10px;border:none;
      font-family:'DM Sans',sans-serif;font-weight:600;font-size:.88rem;
      cursor:pointer;transition:all .2s;
    }
    .btn-gold{background:var(--gold);color:#0a0e1a}
    .btn-gold:hover{background:var(--gold2);transform:translateY(-1px)}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}
    .btn-outline:hover{border-color:var(--gold);color:var(--gold)}
    .btn-sm{padding:6px 14px;font-size:.8rem}
    .btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
    .btn-danger:hover{background:rgba(239,68,68,.25)}

    .login-screen{
      min-height:calc(100vh - 62px);
      display:flex;
      align-items:center;
      justify-content:center;
      background:radial-gradient(ellipse at top, rgba(245,200,66,.12) 0%, transparent 55%, var(--bg) 100%);
      padding:24px;
    }
    .login-card{
      text-align:center;
      padding:52px 44px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:24px;
      max-width:420px;
      width:100%;
      box-shadow:0 32px 80px rgba(0,0,0,.5);
    }
    .login-icon{font-size:3.8rem;margin-bottom:16px;display:block}
    .login-card h1{
      font-family:'Bebas Neue',sans-serif;
      font-size:2.8rem;color:var(--gold);
      letter-spacing:.04em;margin-bottom:8px;
    }
    .login-card p{color:var(--muted);margin-bottom:32px;line-height:1.6}
    .btn-google{
      display:flex;align-items:center;justify-content:center;gap:12px;
      width:100%;padding:14px;background:#fff;color:#1f2937;border:none;border-radius:12px;
      font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;
    }
    .btn-google:hover{background:#f3f4f6;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
    .btn-google img{width:20px;height:20px}

    .tabs{
      display:flex;gap:4px;padding:20px 28px 0;border-bottom:1px solid var(--border);
    }
    .tab{
      padding:10px 20px;border-radius:10px 10px 0 0;font-weight:600;font-size:.88rem;cursor:pointer;
      color:var(--muted);border:none;background:transparent;transition:all .2s;position:relative;
    }
    .tab.active{color:var(--gold);background:var(--card)}
    .tab.active::after{
      content:"";position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--gold);
    }

    .main{padding:28px;max-width:1100px;margin:0 auto}
    .page{display:none}
    .page.active{display:block}

    .section-header{
      display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;
    }
    .section-header h2{
      font-family:'Bebas Neue',sans-serif;
      font-size:1.8rem;letter-spacing:.04em;color:var(--gold);
    }

    .alert{
      padding:12px 18px;border-radius:10px;font-size:.88rem;margin-bottom:20px;display:flex;align-items:center;gap:10px;
    }
    .alert-info{background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);color:#93c5fd}
    .alert-warn{background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.25);color:var(--gold)}
    .alert-success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:var(--green)}
    .alert-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:var(--red)}

    .grupos-grid{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-top:20px;
    }
    .grupo-card{
      background:var(--card);border:2px solid var(--border);border-radius:var(--radius);
      padding:24px;cursor:pointer;transition:all .22s;position:relative;overflow:hidden;
    }
    
    .grupo-card::before{
     content:'';
     position:absolute;
     inset:0;
     background:linear-gradient(135deg, rgba(245,200,66,.04), transparent);
     opacity:0;
     transition:opacity .22s;
     pointer-events:none;
   }

.grupo-card .btn{
  position:relative;
  z-index:2;
}

    .grupo-card .btn{
      position:relative;
      z-index:2;
    }
    .grupo-card:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.3)}
    .grupo-card:hover::before{opacity:1}
    .grupo-card.mi-grupo{border-color:var(--gold);background:var(--card2)}
    .grupo-card h3{font-size:1.15rem;margin-bottom:6px}
    .grupo-card p{color:var(--muted);font-size:.85rem}

    .badge{
      display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;
      font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;
    }
    .badge-gold{background:rgba(245,200,66,.15);color:var(--gold)}
    .badge-blue{background:rgba(59,130,246,.15);color:#60a5fa}
    .badge-green{background:rgba(34,197,94,.15);color:var(--green)}

    /* ── ACORDEÓN APUESTAS (mismo look que admin) ── */
    .fase-block{margin-bottom:8px;border-radius:12px;overflow:hidden;border:1px solid var(--border);}
    .fase-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--card);cursor:pointer;user-select:none;transition:background .18s;gap:12px;}
    .fase-header:hover{background:var(--card2);}
    .fase-header.open{background:var(--card2);border-bottom:1px solid var(--border);}
    .fase-header-left{display:flex;align-items:center;gap:12px;}
    .fase-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
    .fase-icon-grupos{background:rgba(245,200,66,.12);color:var(--gold);}
    .fase-icon-elim{background:rgba(59,130,246,.12);color:#60a5fa;}
    .fase-label{font-family:'Bebas Neue',sans-serif;font-size:1rem;font-weight:800;letter-spacing:.05em;color:var(--text);}
    .fase-sublabel{font-size:.7rem;color:var(--muted);margin-top:1px;}
    .fase-chevron{color:var(--muted);transition:transform .22s;font-size:.85rem;flex-shrink:0;}
    .fase-header.open .fase-chevron{transform:rotate(180deg);}
    .fase-progress{font-size:.7rem;font-weight:700;font-family:'Bebas Neue',sans-serif;letter-spacing:.04em;padding:3px 10px;border-radius:6px;background:rgba(255,255,255,.05);color:var(--muted);white-space:nowrap;}
    .fase-progress.completo{background:rgba(34,197,94,.12);color:var(--green);}
    .fase-body{display:none;}
    .fase-body.open{display:block;}

    /* Tabs de grupo */
    .grupo-tabs-wrap{display:flex;align-items:center;gap:6px;padding:12px 16px 0;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--bg2);}
    .grupo-tab{font-family:'Bebas Neue',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:6px 13px;border-radius:7px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
    .grupo-tab:hover{border-color:rgba(245,200,66,.35);color:var(--gold);}
    .grupo-tab.active{background:var(--gold);color:#0a0e1a;border-color:var(--gold);}
    .grupo-tab .gtab-check{font-size:.6rem;opacity:.75;}
    .grupo-panel{display:none;padding:12px 16px;}
    .grupo-panel.active{display:block;}
    .fase-partidos-wrap{padding:12px 16px;}

    /* Partido row — nuevo diseño */
    .partido-row{
      background:var(--card2);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;
      transition:border-color .2s;
    }
    .partido-row-inner{
      display:grid;grid-template-columns:1fr auto 1fr auto;align-items:center;gap:12px;padding:14px 16px;
    }
    .partido-row.tiene-apuesta{border-color:rgba(34,197,94,.35);}
    .partido-row.tiene-apuesta .partido-row-inner{border-left:3px solid var(--green);}
    .partido-row:hover{border-color:rgba(245,200,66,.3);}
    .team-name{display:flex;align-items:center;gap:8px;font-weight:700;font-size:.9rem;color:var(--text);}
    .team-name.right{flex-direction:row-reverse;}

    /* Centro inputs */
    .score-inputs{display:flex;flex-direction:column;align-items:center;gap:4px;}
    .score-inputs-row{display:flex;align-items:center;gap:6px;}
    .score-input{
      width:46px;height:46px;text-align:center;background:var(--card);border:1px solid var(--border);
      border-radius:10px;color:var(--text);font-size:1.2rem;font-weight:700;font-family:'DM Sans',sans-serif;transition:all .2s;
    }
    .score-input:focus{outline:none;border-color:var(--gold);background:var(--bg2);}
    .score-input:disabled{opacity:.45;cursor:not-allowed;}
    .score-sep{color:var(--muted);font-weight:800;font-size:1.1rem;}
    .score-date{font-size:.65rem;color:var(--muted);}

    /* Acciones derecha */
    .partido-acciones{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;min-width:100px;}
    .save-btn{
      padding:7px 16px;background:var(--gold);color:#0a0e1a;border:none;border-radius:8px;
      font-weight:700;font-size:.78rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;
    }
    .save-btn:hover{background:var(--gold2);}
    .save-btn:disabled{opacity:.4;cursor:not-allowed;}
    .save-btn.guardado{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);}

    /* Meta bar */
    .partido-meta{
      padding:6px 16px 10px;font-size:.67rem;color:var(--muted);
      display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;
    }
    .partido-meta i{color:rgba(245,200,66,.5);font-size:.62rem;}

    .pts-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:.75rem;font-weight:700;}
    .pts-4{background:rgba(245,200,66,.2);color:var(--gold);}
    .pts-3{background:rgba(59,130,246,.2);color:#60a5fa;}
    .pts-2{background:rgba(34,197,94,.2);color:var(--green);}
    .pts-1{background:rgba(148,163,184,.2);color:#94a3b8;}
    .pts-0{background:rgba(239,68,68,.15);color:var(--red);}

    .resultado-real{font-size:.72rem;font-weight:700;font-family:'Bebas Neue',sans-serif;letter-spacing:.04em;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:2px 9px;color:var(--muted);}

    .cerrado-banner{
      background:linear-gradient(135deg,rgba(239,68,68,.1),rgba(239,68,68,.05));
      border:1px solid rgba(239,68,68,.3);border-radius:12px;padding:14px 20px;color:var(--red);
      font-weight:600;margin-bottom:20px;display:flex;align-items:center;gap:10px;
    }

    .ranking-table{width:100%;border-collapse:collapse;margin-top:16px}
    .mundial-grupos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
    .mundial-grupo-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
    .mundial-grupo-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--card2);border-bottom:1px solid var(--border);}
    .ranking-table th{

      text-align:left;padding:10px 16px;font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;
      color:var(--muted);border-bottom:1px solid var(--border);
    }
    .ranking-table td{
      padding:14px 16px;border-bottom:1px solid var(--border);font-size:.92rem;
    }
    .ranking-table tr:last-child td{border-bottom:none}
    .ranking-table tr:hover td{background:var(--card2)}
    .pos-badge{
      width:30px;height:30px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;
      font-weight:700;font-size:.85rem;
    }
    .pos-1{background:rgba(245,200,66,.2);color:var(--gold)}
    .pos-2{background:rgba(148,163,184,.2);color:#94a3b8}
    .pos-3{background:rgba(205,127,50,.2);color:#cd7f32}
    .pos-n{background:var(--card2);color:var(--muted)}
    .score-bar-wrap{display:flex;align-items:center;gap:10px}
    .score-bar{
      flex:1;height:6px;background:var(--card2);border-radius:999px;overflow:hidden;max-width:120px;
    }
    .score-bar-fill{
      height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));border-radius:999px;transition:width .6s ease;
    }

    .empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
    .empty-state i{font-size:2.5rem;margin-bottom:14px;display:block}
    .cerrado-banner{
      background:linear-gradient(135deg, rgba(239,68,68,.1), rgba(239,68,68,.05));
      border:1px solid rgba(239,68,68,.3);border-radius:12px;padding:14px 20px;color:var(--red);
      font-weight:600;margin-bottom:20px;display:flex;align-items:center;gap:10px;
    }

    #toast{
      position:fixed;bottom:28px;right:28px;background:var(--card2);border:1px solid var(--border);border-radius:12px;
      padding:14px 20px;font-size:.88rem;box-shadow:0 16px 40px rgba(0,0,0,.4);z-index:9999;
      opacity:0;transform:translateY(10px);transition:all .3s;max-width:340px;pointer-events:none;
    }
    #toast.show{opacity:1;transform:translateY(0)}

    @media (max-width:640px){
      .site-nav{padding:0 16px}
      .site-nav-links .site-nav-link{display:none}
      .main{padding:16px}
      .tabs{padding:16px 16px 0;overflow-x:auto}
      .partido-row{grid-template-columns:1fr;gap:10px}
      .team-name.right{flex-direction:row;justify-content:flex-start;text-align:left}
      .score-inputs{justify-content:center}
      nav.app-nav{padding:0 16px}
    }
  </style>
</head>

      } catch(e) {
        // Sin permisos o sin conexión → tratar como sin configuración (todo abierto)

        plazosConfig = {};

    // Verifica si una fase está cerrada: bloqueo manual OR fecha vencida
    function isFaseCerrada(fasePollaId) {
      const plazoId = FASE_A_PLAZO[fasePollaId] || fasePollaId;
      const p = plazosConfig[plazoId];
      if (!p) return false;                                         // sin configuración = abierto
      if (p.bloqueado === true) return true;                        // bloqueo manual admin → siempre cerrado
      if (p.fechaLimite && new Date() > new Date(p.fechaLimite)) return true; // fecha vencida → cerrado
      return false;
    }

    // Verifica si CUALQUIER fase está cerrada (para bloqueo global)
    function isAlgunaCerrada() {
      return Object.keys(FASE_A_PLAZO).some(f => isFaseCerrada(f));
    }

    // Compatibilidad — verifica solo fase grupos
    function isCerrado() {
      return isFaseCerrada('grupos');
    }

    function normalizeText(t='') {
      return String(t).toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
    }

    function getFlag(nombre) {
      return FLAGS[normalizeText(nombre)] || '🏳️';
    }

    function formatFecha(f) {
      if (!f) return 'Fecha por definir';
      if (typeof f === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(f)) {
        const d = new Date(f + 'T12:00:00');
        return d.toLocaleDateString('es-CL', { day:'2-digit', month:'short' });
      }
      const d = new Date(f);
      if (!isNaN(d)) {
        return d.toLocaleDateString('es-CL', { day:'2-digit', month:'short' });
      }
      return String(f);
    }

    function formatFechaHora(ts) {
      if (!ts) return '';
      try {
        const d = ts?.toDate ? ts.toDate() : new Date(ts);
        return d.toLocaleDateString('es-CL', { day:'2-digit', month:'short', year:'numeric' }) + ' ' +
               d.toLocaleTimeString('es-CL', { hour:'2-digit', minute:'2-digit' });
      } catch {
        return '';
      }
    }

    function toast(msg, type='info') {
      const t = document.getElementById('toast');
      const icons = {
        info:'ℹ️ ',
        success:'✅ ',
        warn:'⚠️ ',
        error:'❌ '
      };
      t.textContent = (icons[type] || '') + msg;
      t.className = 'show';
      setTimeout(() => { t.className = ''; }, 3200);
    }
    window.toast = toast;

    // ── Conversión de hora local estadio → hora Chile (UTC-4 jun-jul) ────
    const TZ_OFFSETS = {
      'nueva york':0,'new york':0,'boston':0,'miami':0,'atlanta':0,
      'filadelfia':0,'philadelphia':0,'toronto':0,
      'dallas':1,'kansas city':1,'houston':1,
      'ciudad de mexico':1,'ciudad de méxico':1,'guadalajara':1,'monterrey':1,
      'denver':2,
      'los angeles':3,'los ángeles':3,'san francisco':3,'seattle':3,
      'santa clara':3,'vancouver':3,
    };
    function getOffsetEstadio(estadio) {
      if (!estadio) return 0;
      const lower = estadio.toLowerCase();
      for (const [ciudad, offset] of Object.entries(TZ_OFFSETS)) {
        if (lower.includes(ciudad)) return offset;
      }
      return 0;
    }
    function fmtHoraChile(h, estadio) {
      if (!h) return null;
      const str = String(h).trim();
      if (!str.match(/^\d{1,2}:\d{2}/)) return null;
      const [hh, mm] = str.split(':').map(Number);
      const offset = getOffsetEstadio(estadio);
      let total = hh * 60 + mm + offset * 60;
      const sigDia = total >= 24 * 60;
      total = ((total % 1440) + 1440) % 1440;
      return `${String(Math.floor(total/60)).padStart(2,'0')}:${String(total%60).padStart(2,'0')}${sigDia?' (+1d)':''}`;
    }

    function calcularPuntaje(real, apuesta) {
      return calcularPuntajePolla(
        { local: real.local,         visita: real.visita },
        { local: apuesta.golesLocal, visita: apuesta.golesVisita }
      ) ?? 0;
    }

        .sort((a, b) => (Number(a.numero || 0) - Number(b.numero || 0)));
    }

      try {
        let snap;

          snap = await getDocs(query(collection(db, 'grupos'), orderBy('creadoEn')));

          snap = await getDocs(collection(db, 'grupos'));
        }

      } catch (e) {

    async function unirseGrupo(grupoId, nombreGrupo) {

  try {

    if (grupoSnap.exists() && grupoSnap.data().inscripcionBloqueada) {
      return toast('Este grupo ya no acepta nuevos participantes', 'warn');

    // si falla la lectura, continuar igual (no bloquear al usuario por error de red)

    uid: currentUser?.uid,

      uid: currentUser.uid,
      nombre: currentUser.displayName || currentUser.email || 'Usuario',
      email: currentUser.email || '',

      grupoNombre: nombreGrupo,
      estado: 'pendiente',

    };

    console.log('Guardando participante', payload);

    await setDoc(ref, payload, { merge: true });

    console.log('setDoc OK');

    await cargarMiParticipante();

    console.log('miParticipante luego de guardar', miParticipante);

    renderGrupos();
    toast(`Solicitud enviada a ${nombreGrupo}`, 'success');
  } catch (e) {
    console.error('Error al unirse al grupo:', e);
    alert('Error al unirse al grupo: ' + (e?.message || e));
    toast(e?.message || 'Error al unirse al grupo', 'error');
  }
}

              </div>
              <div style="color:rgba(34,197,94,.8);font-size:0.74rem;line-height:1.5;">
                <strong style="color:var(--green);">Ahora disponible:</strong>
                ${fasesAbiertas.map(f => `<span style="display:inline-flex;align-items:center;gap:3px;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25);border-radius:5px;padding:1px 8px;margin:1px 2px;font-size:0.72rem;">${f.label}</span>`).join('')}
                <br><span style="opacity:.75;font-size:0.7rem;margin-top:4px;display:block;">
                  Las siguientes fases se abrirán una vez que el admin cierre la anterior. Ingresa tus apuestas antes de que cierren.
                </span>
              </div>
            </div>
          </div>`;
      }

      // Sección roja — fases cerradas (solo si hay alguna)
      if (fasesCerradas.length > 0) {
        bannerPlazos += `
          <div style="background:rgba(239,68,68,.07);padding:10px 16px;display:flex;align-items:flex-start;gap:12px;">
            <i class="fas fa-lock" style="color:var(--red);margin-top:2px;flex-shrink:0;font-size:0.85rem;"></i>
            <div style="font-size:0.74rem;color:var(--muted);">
              <strong style="color:rgba(239,68,68,.8);">Cerrado:</strong>
              ${fasesCerradas.map(f => `<span style="opacity:.75;">${f.label}</span>`).join(' · ')}
              <span style="opacity:.55;font-size:0.68rem;display:block;margin-top:2px;">Solo el administrador puede reabrir estas fases.</span>
            </div>
          </div>`;
      }

      bannerPlazos += `</div>`;

      // ── Fixture local (misma fuente de verdad que admin) ──────────────────
      // FG viene del módulo fifa2026.js
const FG = FIXTURE_GRUPOS;

      // Enriquecer fixture con resultados reales de Firestore
      const firestoreById = {};
      globalPartidos.forEach(m => {
        firestoreById[m.id] = m;
        // Mapear también con prefijo fg
        firestoreById['fg' + m.id] = m;
      });

      // Fases eliminatorias
      const FASES_ELIM = [
        {id:'r32avos', label:'32avos de Final', sublabel:'1–8 jul · 16 partidos',
         ids:['r32_1','r32_2','r32_3','r32_4','r32_5','r32_6','r32_7','r32_8','r32_9','r32_10','r32_11','r32_12','r32_13','r32_14','r32_15','r32_16']},
        {id:'octavos', label:'Octavos de Final', sublabel:'11–14 jul · 8 partidos',
         ids:['r16_1','r16_2','r16_3','r16_4','r16_5','r16_6','r16_7','r16_8']},
        {id:'cuartos', label:'Cuartos de Final', sublabel:'18–19 jul · 4 partidos',
         ids:['qf1','qf2','qf3','qf4']},
        {id:'semis', label:'Semifinales', sublabel:'22–23 jul · 2 partidos',
         ids:['sf1','sf2']},
        {id:'tercero', label:'Tercer Lugar', sublabel:'25 jul',
         ids:['3p']},
        {id:'final', label:'Gran Final 🏆', sublabel:'26 jul · MetLife Stadium',
         ids:['fin']},
      ];

      // ── Construir fila de partido ──────────────────────────────────────
      function buildPartidoRow(base, faseId = 'grupos') {
        const faseCerrada = isFaseCerrada(faseId);
        const fs  = firestoreById[base.id] || {};
        const p   = { ...base, ...fs };
        const apuesta = misApuestas[p.id];
        const tieneApuesta = !!apuesta;

        const tieneReal = p.resultado_local != null && p.resultado_visita != null;
        // Siempre recalcular desde resultado real — no confiar en puntaje guardado en Firestore
        const puntaje = tieneReal && tieneApuesta
          ? calcularPuntaje(
              { local: p.resultado_local, visita: p.resultado_visita },
              { local: apuesta.golesLocal, visita: apuesta.golesVisita }
            )
          : null;

        const ptsClass = puntaje != null ? `pts-${puntaje}` : '';
        const ptsLabel = puntaje != null ? `${puntaje} pt${puntaje===1?'':'s'}` : '';

        const localNombre  = p.local  || 'Por definir';
        const visitaNombre = p.visita || 'Por definir';
        const horaChile = fmtHoraChile(p.hora, p.estadio);
        const horaStr = horaChile ? horaChile + ' CL' : (p.hora || '');
        const fechaStr = p.fecha || '';

        return `
          <div class="partido-row ${tieneApuesta?'tiene-apuesta':''}" id="prow-${p.id}">
            <div class="partido-row-inner">
              <div class="team-name">
                <span style="font-size:1.2rem">${getFlag(localNombre)}</span>
                <span>${localNombre}</span>
              </div>

              <div class="score-inputs">
                <div class="score-inputs-row">
                  <input type="number" min="0" max="20" class="score-input" id="local-${p.id}"
                    value="${tieneApuesta ? apuesta.golesLocal : ''}" placeholder="–" ${faseCerrada?'disabled':''}>
                  <span class="score-sep">:</span>
                  <input type="number" min="0" max="20" class="score-input" id="visita-${p.id}"
                    value="${tieneApuesta ? apuesta.golesVisita : ''}" placeholder="–" ${faseCerrada?'disabled':''}>
                </div>
                <span class="score-date">${fechaStr}${horaStr?' · '+horaStr:''}</span>
              </div>

              <div class="team-name right">
                <span>${visitaNombre}</span>
                <span style="font-size:1.2rem">${getFlag(visitaNombre)}</span>
              </div>

              <div class="partido-acciones">
                ${ptsLabel ? `<span class="pts-badge ${ptsClass}">${ptsLabel}</span>` : ''}
                ${tieneReal ? `<span class="resultado-real">${p.resultado_local}–${p.resultado_visita}</span>` : ''}
                ${!faseCerrada ? `<button class="save-btn" id="save-${p.id}" disabled data-faseid="${faseId}"><i class="fas fa-save"></i> Guardar</button>` : ''}
                ${faseCerrada && tieneApuesta ? `<span style="font-size:.65rem;color:var(--muted);"><i class="fas fa-lock"></i> Cerrado</span>` : ''}
                ${!faseCerrada && tieneApuesta && !ptsLabel ? `<span style="font-size:.65rem;color:var(--green);"><i class="fas fa-check"></i> Guardado</span>` : ''}
              </div>
            </div>
            <div class="partido-meta">
              <span><i class="fas fa-location-dot"></i> ${p.estadio||'TBD'}</span>
              ${tieneReal&&tieneApuesta&&puntaje===null?`<span style="color:var(--muted);font-size:.65rem;">Puntaje pendiente</span>`:''}
            </div>
          </div>`;
      }

      // Guardar estado del acordeón antes de re-renderizar
      const faseAbierta = document.querySelector('.fase-header.open')?.id?.replace('fh-','') || 'grupos';
      const grupoActivo = document.querySelector('.grupo-tab.active')?.dataset?.grupo || null;
      let html = '';
      html += bannerPlazos; // banner siempre visible: verde = abierto, rojo = cerrado

      // Grupos — acordeón + tabs
      const gruposKeys = Object.keys(FG).sort();
      const apuestasGruposTotal = gruposKeys.flatMap(g => FG[g]).filter(p => misApuestas[p.id]).length;
      const totalGrupos = gruposKeys.flatMap(g => FG[g]).length;
      const okG = apuestasGruposTotal === totalGrupos && totalGrupos > 0;

      html += `<div class="fase-block">
        <div class="fase-header ${faseAbierta==='grupos'?'open':''}" id="fh-grupos" onclick="toggleFaseApuestas('grupos')">
          <div class="fase-header-left">
            <div class="fase-icon fase-icon-grupos"><i class="fas fa-layer-group"></i></div>
            <div>
              <div class="fase-label">Fase de Grupos</div>
              <div class="fase-sublabel">12 – 26 jun · 12 grupos · 72 partidos</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <span class="fase-progress ${okG?'completo':''}">${okG?'✓ Completo':apuestasGruposTotal+'/'+totalGrupos+' apostados'}</span>
            <i class="fas fa-chevron-down fase-chevron"></i>
          </div>
        </div>
        <div class="fase-body ${faseAbierta==='grupos'?'open':''}" id="fb-grupos">
          <div class="grupo-tabs-wrap" id="gtabs-grupos">`;

      gruposKeys.forEach((g, i) => {
        const apostados = FG[g].filter(p => misApuestas[p.id]).length;
        const tot = FG[g].length;
        const ok  = apostados === tot && tot > 0;
        html += `<button class="grupo-tab${i===0?' active':''}" data-grupo="${g}">
          Grupo ${g} <span class="gtab-check">${ok?'✓':apostados+'/'+tot}</span>
        </button>`;
      });

      html += `</div>`; // close tabs-wrap

      gruposKeys.forEach((g, i) => {
        html += `<div class="grupo-panel${i===0?' active':''}" id="gpanel-${g}">`;
        FG[g].forEach(base => { html += buildPartidoRow(base, 'grupos'); });
        html += `</div>`;
      });

      html += `</div></div>`; // close fase-body + fase-block

      // Fases eliminatorias
      FASES_ELIM.forEach(fase => {
        const apostados = fase.ids.filter(id => misApuestas[id]).length;
        const tot = fase.ids.length;
        const ok  = apostados === tot && tot > 0;
        html += `<div class="fase-block">
          <div class="fase-header ${faseAbierta===fase.id?'open':''}" id="fh-${fase.id}" onclick="toggleFaseApuestas('${fase.id}')">
            <div class="fase-header-left">
              <div class="fase-icon fase-icon-elim"><i class="fas fa-trophy"></i></div>
              <div>
                <div class="fase-label">${fase.label}</div>
                <div class="fase-sublabel">${fase.sublabel}</div>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
              <span class="fase-progress ${ok?'completo':''}">${ok?'✓ Completo':apostados+'/'+tot+' apostados'}</span>
              <i class="fas fa-chevron-down fase-chevron"></i>
            </div>
          </div>
          <div class="fase-body ${faseAbierta===fase.id?'open':''}" id="fb-${fase.id}">
            <div style="padding:10px 14px;background:rgba(245,200,66,.05);border-bottom:1px solid rgba(245,200,66,.15);font-size:0.72rem;color:var(--muted);display:flex;gap:8px;align-items:flex-start;">
              <i class="fas fa-circle-info" style="color:var(--gold);margin-top:1px;flex-shrink:0;"></i>
              <span>El puntaje se calcula sobre el resultado al final de los <strong style="color:var(--text);">90 min + prórroga</strong>. Los penales no cuentan para el marcador.</span>
            </div>
            <div class="fase-partidos-wrap">`;

        fase.ids.forEach(id => {
          const fs = firestoreById[id];
          if(fs) html += buildPartidoRow(fs, fase.id);
          else   html += buildPartidoRow({id, local:'Por confirmar', visita:'Por confirmar', fecha:'–', estadio:'–'}, fase.id);
        });

        html += `</div></div></div>`;
      });

      container.innerHTML = html || `<div class="empty-state"><i class="fas fa-futbol"></i><p>No hay partidos cargados aún.</p></div>`;

      // ── Eventos tabs de grupo ──────────────────────────────────────────
      container.querySelectorAll('.grupo-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          container.querySelectorAll('.grupo-tab').forEach(t => t.classList.remove('active'));
          container.querySelectorAll('.grupo-panel').forEach(p => p.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById(`gpanel-${tab.dataset.grupo}`)?.classList.add('active');
        });
      });

      // ── Eventos inputs/guardar ─────────────────────────────────────────
      // Bindear TODOS los botones guardar (la validación de plazo está en guardarApuesta)
      container.querySelectorAll('.save-btn').forEach(btn => {
        const id = btn.id.replace('save-', '');
        const faseId = btn.dataset.faseid || 'grupos';
        const l = document.getElementById(`local-${id}`);
        const v = document.getElementById(`visita-${id}`);
        if (l && v) {
          const enable = () => { btn.disabled = false; };
          l.addEventListener('input', enable);
          v.addEventListener('input', enable);
          btn.addEventListener('click', () => {
            const partido = firestoreById[id] || Object.values(FG).flat().find(p => p.id === id) || { id };
            guardarApuesta({ ...partido, _faseId: faseId });
          });
        }
      });
      // Restaurar grupo activo después del render
      if (grupoActivo) {
        const tab = document.querySelector(`.grupo-tab[data-grupo="${grupoActivo}"]`);
        if (tab) tab.click();
      }
    }

    window.toggleFaseApuestas = function(id) {
      const h = document.getElementById('fh-' + id);
      const b = document.getElementById('fb-' + id);
      if(h) h.classList.toggle('open');
      if(b) b.classList.toggle('open');
    };

    async function guardarApuesta(partido) {
      // ── Doble seguridad: verificar plazo en el servidor antes de escribir ──
      await cargarPlazos(); // refrescar desde Firestore por si cambió
      const faseId = partido._faseId || 'grupos';
      if (isFaseCerrada(faseId)) {
        toast('El plazo para esta fase ya venció. No puedes ingresar apuestas.', 'warn');
        const grupoActivo = document.querySelector('.grupo-tab.active')?.dataset?.grupo || null;
        await renderApuestas();
        if (grupoActivo) {
          const tab = document.querySelector(`.grupo-tab[data-grupo="${grupoActivo}"]`);
          if (tab) tab.click();
        }
        return;
      }

      const l = document.getElementById(`local-${partido.id}`).value;
      const v = document.getElementById(`visita-${partido.id}`).value;

      if (l === '' || v === '') return toast('Ingresa ambos resultados', 'warn');

      const existente = misApuestas[partido.id];
      const payload = {
        uid: currentUser.uid,
        nombre: currentUser.displayName || currentUser.email || 'Usuario',
        email: currentUser.email || '',
        grupoId: miParticipante.grupoId,
        grupoNombre: miParticipante.grupoNombre,
        partidoId: partido.id,
        fase: partido.fase || (partido.grupo ? `Grupo ${partido.grupo}` : faseId),
        numeroPartido: Number(partido.numero || 0),
        golesLocal: Number(l),
        golesVisita: Number(v),
        actualizadoEn: serverTimestamp()
      };

      if (partido.resultado_local != null && partido.resultado_visita != null) {
        payload.puntaje = calcularPuntaje(
          { local: partido.resultado_local, visita: partido.resultado_visita },
          { local: Number(l), visita: Number(v) }
        );
      }

      try {
        if (existente?.id) {
          await updateDoc(doc(db, 'apuestas', existente.id), payload);
        } else {
          payload.creadoEn = serverTimestamp();
          await addDoc(collection(db, 'apuestas'), payload);
        }

        await cargarMisApuestas();

        // Guardar estado acordeón antes de re-renderizar
        const faseActivaAntes = document.querySelector('.fase-header.open')?.id?.replace('fh-','') || 'grupos';
        const grupoActivoAntes = document.querySelector('.grupo-tab.active')?.dataset?.grupo || null;

        await renderApuestas();

        // Restaurar fase y grupo activos
        const fhRestore = document.getElementById(`fh-${faseActivaAntes}`);
        const fbRestore = document.getElementById(`fb-${faseActivaAntes}`);
        if (fhRestore && !fhRestore.classList.contains('open')) {
          fhRestore.classList.add('open');
          if (fbRestore) fbRestore.classList.add('open');
        }
        if (grupoActivoAntes) {
          const tab = document.querySelector(`.grupo-tab[data-grupo="${grupoActivoAntes}"]`);
          if (tab) tab.click();
        }

        toast('Apuesta guardada ✓', 'success');
      } catch (e) {
        toast(e.message, 'error');
      }
    }

    async function renderRanking() {
      const container = document.getElementById('ranking-content');

      if (!miParticipante) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-lock"></i><p>Únete a un grupo para ver el ranking.</p></div>`;
        return;
      }

      container.innerHTML = `<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Cargando ranking...</p></div>`;

      try {
        // 1) Participantes aprobados del grupo
        const participantesSnap = await getDocs(query(
          collection(db, 'participantes'),
          where('grupoId', '==', miParticipante.grupoId)
        ));
        const participantes = participantesSnap.docs
          .map(d => ({ id: d.id, ...d.data() }))
          .filter(p => p.estado === 'aprobado');

        if (!participantes.length) {
          container.innerHTML = `<div class="empty-state"><i class="fas fa-users"></i><p>Aún no hay participantes aprobados en este grupo.</p></div>`;
          return;
        }

        // 2) Siempre recargar partidos frescos desde Firestore
        await cargarPartidos();
        const chkA1 = globalPartidos.find(p => p.id === 'A1');
        console.log('DEBUG A1 despues de cargar:', JSON.stringify(chkA1));

        // Mapa rápido de partido por id
        const partidoById = {};
        globalPartidos.forEach(p => {
          partidoById[p.id] = p;
          // Mapear también con prefijo fg para compatibilidad con apuestas antiguas
          partidoById['fg' + p.id] = p;
        });

        // 3) Todas las apuestas del grupo
        const apuestasSnap = await getDocs(query(
          collection(db, 'apuestas'),
          where('grupoId', '==', miParticipante.grupoId)
        ));

        // 4) Acumular — recalculando puntos en tiempo real desde calcularPuntajePolla
        const acumulado = {};
        participantes.forEach(p => {
          acumulado[p.uid || p.id] = {
            uid:      p.uid || p.id,
            nombre:   p.nombre || p.email || 'Jugador',
            total:    0,
            aciertos: 0,   // resultado exacto (local y visita correctos)
            parciales:0,   // ganador/empate correcto pero no el marcador exacto
            apostados:0,   // total de partidos con apuesta
            jugados:  0,   // partidos ya jugados donde apostó
          };
        });

        console.log('DEBUG apuestas total:', apuestasSnap.size);
        console.log('DEBUG partidoById keys sample:', Object.keys(partidoById).slice(0,5));
        apuestasSnap.forEach(d => {
          const a = d.data();
          const uid = a.uid;
          if (!acumulado[uid]) return;

          const partido = partidoById[a.partidoId];
          if (a.partidoId === 'fgA1') console.log('DEBUG fgA1 partido:', JSON.stringify(partido));
          if (!partido) console.log('DEBUG sin partido para:', a.partidoId);
          else if (partido.resultado_local == null) console.log('DEBUG sin resultado para:', a.partidoId);
          else console.log('DEBUG partido encontrado:', a.partidoId, partido.resultado_local);
          acumulado[uid].apostados++;

          if (!partido || partido.resultado_local == null) return; // partido sin resultado aún

          acumulado[uid].jugados++;

          // Recalcular en tiempo real — fuente de verdad
          const pts = calcularPuntajePolla(
            { local: Number(partido.resultado_local), visita: Number(partido.resultado_visita) },
            { local: Number(a.golesLocal),            visita: Number(a.golesVisita) }
          ) ?? 0;

          acumulado[uid].total += pts;
          if (pts === 4)      acumulado[uid].aciertos++;    // exacto: marcador exacto ganador
          else if (pts === 2) acumulado[uid].aciertos++;    // exacto: empate exacto
          else if (pts === 3) acumulado[uid].parciales++;   // parcial: ganador correcto sin marcador exacto
          else if (pts === 1) acumulado[uid].parciales++;   // parcial: empate correcto sin marcador exacto // parcial (1–2 pts)
        });

        // 5) Ordenar y asignar posición
        const ranking = Object.values(acumulado)
          .sort((a,b) => b.total - a.total || b.aciertos - a.aciertos || b.parciales - a.parciales || a.nombre.localeCompare(b.nombre))
          .map((r, i) => ({ ...r, posicion: i + 1 }));

        const miPosicion = ranking.find(r => r.uid === currentUser.uid);
        const maxPts = Math.max(ranking[0]?.total || 1, 1);

        // 6) Banner con posición propia
        let posBanner = '';
        if (miPosicion) {
          const posClass = miPosicion.posicion === 1 ? 'pos-1' : miPosicion.posicion === 2 ? 'pos-2' : miPosicion.posicion === 3 ? 'pos-3' : 'pos-n';
          const emoji = miPosicion.posicion === 1 ? '🥇' : miPosicion.posicion === 2 ? '🥈' : miPosicion.posicion === 3 ? '🥉' : '📍';
          posBanner = `
            <div style="background:rgba(245,200,66,.07);border:1px solid rgba(245,200,66,.25);border-radius:12px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
              <span style="font-size:2rem;">${emoji}</span>
              <div style="flex:1;min-width:0;">
                <div style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.04em;">
                  Vas ${miPosicion.posicion}° de ${ranking.length} en ${miParticipante.grupoNombre || 'tu grupo'}
                </div>
                <div style="font-size:0.75rem;color:var(--muted);margin-top:2px;">
                  ${miPosicion.total} pts · ${miPosicion.aciertos} exactos · ${miPosicion.parciales} parciales · ${miPosicion.jugados}/${miPosicion.apostados} jugados
                  <span style="font-size:0.65rem;opacity:.7;display:block;margin-top:2px;">Exacto ganador=4pts · Ganador=3pts · Empate exacto=2pts · Empate=1pt</span>
                </div>
              </div>
              <div style="font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--gold);">${miPosicion.total}</div>
            </div>`;
        }

        // 7) Tabla
        let html = `
          <div class="section-header"><h2>Ranking · ${miParticipante.grupoNombre || ''}</h2></div>
          ${posBanner}
          <table class="ranking-table">
            <thead>
              <tr>
                <th style="width:36px;">#</th>
                <th>Jugador</th>
                <th style="text-align:center;" title="Puntos totales">Pts</th>
                <th style="text-align:center;color:#16a34a;" title="Exactos: marcador exacto ganador (4pts) o empate exacto (2pts)">Exactos</th>
                <th style="text-align:center;color:#f59e0b;" title="Parciales: ganador correcto sin marcador (3pts) o empate correcto (1pt)">Parciales</th>
                <th></th>
              </tr>
            </thead>
            <tbody>`;

        ranking.forEach(r => {
          const esTu = r.uid === currentUser.uid;
          const posClass = r.posicion === 1 ? 'pos-1' : r.posicion === 2 ? 'pos-2' : r.posicion === 3 ? 'pos-3' : 'pos-n';
          const pct = Math.round((r.total / maxPts) * 100);
          const medalla = r.posicion === 1 ? '🥇 ' : r.posicion === 2 ? '🥈 ' : r.posicion === 3 ? '🥉 ' : '';

          html += `
            <tr ${esTu ? 'style="background:rgba(245,200,66,.05)"' : ''}>
              <td><span class="pos-badge ${posClass}">${r.posicion}</span></td>
              <td style="font-weight:${esTu?'700':'400'};">
                ${medalla}${r.nombre}
                ${esTu ? `<span class="badge badge-gold" style="padding:2px 8px;margin-left:6px;font-size:.65rem;">Tú</span>` : ''}
              </td>
              <td style="text-align:center;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--gold);font-weight:700;">${r.total}</td>
              <td style="text-align:center;color:#16a34a;font-weight:600;">${r.aciertos}</td>
              <td style="text-align:center;color:#ca8a04;">${r.parciales}</td>
              <td style="min-width:80px;">
                <div class="score-bar-wrap">
                  <div class="score-bar"><div class="score-bar-fill" style="width:${pct}%"></div></div>
                </div>
              </td>
            </tr>`;
        });

        html += `</tbody></table>
          <div style="font-size:0.68rem;color:var(--muted);margin-top:12px;text-align:center;">
            Puntos calculados en tiempo real · se actualizan cuando el admin ingresa resultados
          </div>`;

        container.innerHTML = html;
      } catch (e) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>${e.message}</p></div>`;
      }
    }

    // ── MUNDIAL: tabla de posiciones de los 12 grupos FIFA ────────────────
    const GRUPOS_FIFA = ['A','B','C','D','E','F','G','H','I','J','K','L'];

    function calcTablaGrupoMundial(grupo) {
      const equipos = {};
      globalPartidos
        .filter(p => p.grupo === grupo)
        .forEach(p => {
          [p.local, p.visita].forEach(e => {
            if (e && !equipos[e]) equipos[e] = {nombre:e,pj:0,g:0,e:0,pe:0,gf:0,gc:0,dg:0,pts:0,forma:[]};
          });
          const gl = p.resultado_local ?? null;
          const gv = p.resultado_visita ?? null;
          if (gl == null || gv == null) return;
          const eqL = equipos[p.local], eqV = equipos[p.visita];
          if (!eqL || !eqV) return;
          const igl = Number(gl), igv = Number(gv);
          eqL.pj++; eqV.pj++;
          eqL.gf += igl; eqL.gc += igv;
          eqV.gf += igv; eqV.gc += igl;
          eqL.dg = eqL.gf - eqL.gc;
          eqV.dg = eqV.gf - eqV.gc;
          if (igl > igv)      { eqL.g++; eqL.pts+=3; eqV.pe++; eqL.forma.push('G'); eqV.forma.push('P'); }
          else if (igl < igv) { eqV.g++; eqV.pts+=3; eqL.pe++; eqL.forma.push('P'); eqV.forma.push('G'); }
          else                { eqL.e++; eqV.e++; eqL.pts++; eqV.pts++; eqL.forma.push('E'); eqV.forma.push('E'); }
        });
      return Object.values(equipos).sort((a,b) =>
        b.pts-a.pts || b.dg-a.dg || b.gf-a.gf || a.nombre.localeCompare(b.nombre)
      );
    }

    async function renderMundial() {
      const container = document.getElementById('mundial-content');
      container.innerHTML = `<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Cargando...</p></div>`;

      try {
        await cargarPartidos();

        // Si los partidos no tienen campo 'grupo', deducirlo desde el ID (fgA1 → grupo A)
        globalPartidos.forEach(p => {
          if (!p.grupo && p.id) {
            const match = p.id.match(/^fg([A-L])/i);
            if (match) p.grupo = match[1].toUpperCase();
          }
        });

        const conGrupo = globalPartidos.filter(p => p.grupo);
        if (!conGrupo.length) {
          container.innerHTML = `<div class="empty-state"><i class="fas fa-database"></i><p>Los partidos no tienen campo 'grupo' en Firestore.<br><span style="font-size:.75rem;opacity:.7;">El admin debe reimportar el fixture.</span></p></div>`;
          return;
        }
      } catch(e) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>Error: ${e.message}</p></div>`;
        return;
      }

      const dotColor = i => i < 2 ? '#16a34a' : i === 2 ? '#f59e0b' : '#6b7280';
      const dotTitle = i => i < 2 ? 'Clasifica a 32avos' : i === 2 ? 'Posible mejor 3ero' : 'Eliminado';
      const formaColor = f => f==='G'?'#16a34a':f==='E'?'#ca8a04':'#ef4444';

      let html = `
        <div style="padding:16px 0 8px;">
          <div style="font-size:0.72rem;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;">
            <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#16a34a;margin-right:4px;"></span>Clasifica a 32avos</span>
            <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#f59e0b;margin-right:4px;"></span>Posible mejor 3ero</span>
            <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#6b7280;margin-right:4px;"></span>Eliminado</span>
          </div>
          <div class="mundial-grupos-grid">`;

      GRUPOS_FIFA.forEach(g => {
        const tabla = calcTablaGrupoMundial(g);
        const jugados = globalPartidos.filter(p => p.grupo === g && p.resultado_local != null).length;
        const sinDatos = jugados === 0;

        html += `<div class="mundial-grupo-card">
          <div class="mundial-grupo-head">
            <span style="font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.06em;">Grupo ${g}</span>
            <span style="font-size:0.68rem;color:var(--muted);">${jugados}/6 jugados</span>
          </div>`;

        if (sinDatos) {
          // Mostrar equipos del grupo sin datos aún
          const equiposGrupo = [...new Set(
            globalPartidos.filter(p=>p.grupo===g).flatMap(p=>[p.local,p.visita]).filter(Boolean)
          )];
          html += `<div style="padding:10px 14px;">`;
          equiposGrupo.forEach((e,i) => {
            html += `<div style="display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--border);">
              <span style="width:8px;height:8px;border-radius:50%;background:#6b7280;display:inline-block;flex-shrink:0;"></span>
              <span style="font-size:0.9rem;">${getFlag(e)}</span>
              <span style="font-size:0.82rem;font-weight:500;">${e}</span>
            </div>`;
          });
          html += `<div style="font-size:0.68rem;color:var(--muted);padding-top:8px;text-align:center;">Sin resultados aún</div>`;
          html += `</div>`;
        } else {
          html += `<table style="width:100%;border-collapse:collapse;">
            <thead><tr style="border-bottom:1px solid var(--border);background:rgba(0,0,0,0.15);">
              <th style="padding:5px 8px;font-size:.58rem;color:var(--muted);font-weight:600;text-align:left;letter-spacing:.08em;" colspan="2">EQUIPO</th>
              <th style="padding:5px 4px;font-size:.58rem;color:var(--muted);font-weight:600;text-align:center;" title="Partidos jugados">PJ</th>
              <th style="padding:5px 4px;font-size:.58rem;color:#16a34a;font-weight:600;text-align:center;" title="Ganados">G</th>
              <th style="padding:5px 4px;font-size:.58rem;color:#ca8a04;font-weight:600;text-align:center;" title="Empates">E</th>
              <th style="padding:5px 4px;font-size:.58rem;color:#ef4444;font-weight:600;text-align:center;" title="Perdidos">P</th>
              <th style="padding:5px 4px;font-size:.58rem;color:var(--muted);font-weight:600;text-align:center;" title="Diferencia de goles">DG</th>
              <th style="padding:5px 8px;font-size:.58rem;color:var(--gold);font-weight:700;text-align:center;" title="Puntos">Pts</th>
            </tr></thead>
            <tbody>`;

          tabla.forEach((t, i) => {
            const dg = t.dg > 0 ? `+${t.dg}` : String(t.dg);
            const formaHtml = t.forma.slice(-3).map(f =>
              `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${formaColor(f)};margin-left:1px;" title="${f==='G'?'Victoria':f==='E'?'Empate':'Derrota'}"></span>`
            ).join('');
            const rowBorder = i < 2 ? 'border-left:3px solid #16a34a;' : i===2 ? 'border-left:3px solid #f59e0b;' : '';

            html += `<tr style="border-bottom:1px solid var(--border);${rowBorder}">
              <td style="padding:6px 4px 6px 8px;width:16px;">
                <span style="width:8px;height:8px;border-radius:50%;background:${dotColor(i)};display:inline-block;" title="${dotTitle(i)}"></span>
              </td>
              <td style="padding:6px 4px;">
                <div style="display:flex;align-items:center;gap:5px;">
                  <span style="font-size:.95rem;">${getFlag(t.nombre)}</span>
                  <span style="font-size:.78rem;font-weight:${i<2?'700':'400'};">${t.nombre}</span>
                  ${formaHtml ? `<span style="margin-left:3px;">${formaHtml}</span>` : ''}
                </div>
              </td>
              <td style="text-align:center;font-size:.78rem;color:var(--muted);padding:4px;">${t.pj}</td>
              <td style="text-align:center;font-size:.78rem;color:#16a34a;font-weight:600;padding:4px;">${t.g}</td>
              <td style="text-align:center;font-size:.78rem;color:#ca8a04;padding:4px;">${t.e}</td>
              <td style="text-align:center;font-size:.78rem;color:#ef4444;padding:4px;">${t.pe}</td>
              <td style="text-align:center;font-size:.78rem;font-weight:600;color:${t.dg>0?'#16a34a':t.dg<0?'#ef4444':'var(--muted)'};padding:4px;">${dg}</td>
              <td style="text-align:center;font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--gold);padding:4px 8px;">${t.pts}</td>
            </tr>`;
          });

          html += `</tbody></table>`;
        }
        html += `</div>`;
      });

      html += `</div></div>`;
      container.innerHTML = html;
    }
  </script>
</body>
</html>
